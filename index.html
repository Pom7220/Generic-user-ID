<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Generic ID Manager">
<title>Generic ID Manager — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#185FA5;--blue-lt:#E6F1FB;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --text:#1C1C1E;--muted:#5F5E5A;--hint:#B4B2A9;
  --bg:#F5F4F0;--surface:#FFFFFF;--border:rgba(0,0,0,0.1);
  --radius:12px;--radius-lg:16px;--shadow:0 2px 16px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --text:#F2F2F7;--muted:#AEAEB2;--hint:#636366;
    --bg:#1C1C1E;--surface:#2C2C2E;--border:rgba(255,255,255,0.1);
    --blue-lt:rgba(24,95,165,.2);--red-lt:rgba(163,45,45,.2);
  }
}
body{
  min-height:100vh;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:var(--surface);border-radius:var(--radius-lg);
  box-shadow:var(--shadow);border:0.5px solid var(--border);
  padding:2rem;width:100%;max-width:400px;
}
.logo{text-align:center;margin-bottom:1.75rem}
.logo-mark{
  width:64px;height:64px;border-radius:18px;background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;margin:0 auto 14px;letter-spacing:-1px;
}
.logo h1{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.logo p{font-size:13px;color:var(--muted)}
.field{margin-bottom:1rem}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input{
  width:100%;padding:11px 14px;border-radius:var(--radius);
  border:0.5px solid var(--border);background:var(--bg);
  color:var(--text);font-size:15px;outline:none;transition:border .15s;font-family:inherit;
}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt)}
.btn{
  width:100%;padding:12px;border-radius:var(--radius);border:none;
  background:var(--blue);color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .15s;font-family:inherit;margin-top:.5rem;
}
.btn:hover{opacity:.88}
.btn:active{opacity:.7;transform:scale(.99)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.error{
  background:var(--red-lt);color:var(--red);
  border:0.5px solid rgba(163,45,45,.25);border-radius:var(--radius);
  padding:10px 14px;font-size:13px;margin-bottom:1rem;display:none;
}
.spinner{
  display:inline-block;width:15px;height:15px;
  border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:7px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.roles{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:1.25rem}
.role-chip{font-size:11px;padding:3px 10px;border-radius:999px;border:0.5px solid var(--border);color:var(--hint)}
.footer{text-align:center;color:var(--hint);font-size:11px;margin-top:1.25rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">GID</div>
    <h1>Generic ID Manager</h1>
    <p>Store access lifecycle · BU-scoped</p>
  </div>

  <div class="error" id="err"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@company.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Sign in</button>

  <div class="roles">
    <span class="role-chip">Store Manager</span>
    <span class="role-chip">BU Manager</span>
    <span class="role-chip">HO Admin</span>
  </div>
  <p class="footer">v0.1 POC · Pom7220/Generic-user-ID</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG — update these two lines if you change Supabase project ──
const SUPABASE_URL  = 'https://hnvytilmxoiaqceseooh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhudnl0aWxteG9pYXFjZXNlb29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTc0ODIsImV4cCI6MjA4OTQ5MzQ4Mn0.x7WCLXRZEoorxEIuk5dwHG8EpasBGGB7peBysWUdElw';
// ───────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Auto-redirect if already logged in
sb.auth.getSession().then(({data:{session}}) => {
  if (session) routeByRole(session.user.id);
});

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
}

async function doLogin() {
  document.getElementById('err').style.display = 'none';
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showErr('Please enter your email and password.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showErr(error.message);
    btn.disabled = false; btn.innerHTML = 'Sign in';
    return;
  }
  routeByRole(data.user.id);
}

async function routeByRole(userId) {
  const { data: roles, error } = await sb
    .from('user_roles')
    .select('role, store_id, bu_id')
    .eq('user_id', userId)
    .limit(1);

  if (error || !roles || roles.length === 0) {
    showErr('No role assigned. Ask admin to run the user_roles insert in Supabase.');
    await sb.auth.signOut();
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').innerHTML = 'Sign in';
    return;
  }

  const role = roles[0].role;
  if      (role === 'store_manager') window.location.href = 'store.html';
  else if (role === 'bu_manager')    window.location.href = 'bu.html';
  else if (role === 'ho_admin')      window.location.href = 'ho.html';
  else                               window.location.href = 'hr-upload.html';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
