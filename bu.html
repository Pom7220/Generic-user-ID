<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BU Dashboard — Generic ID Manager</title>
<link rel="stylesheet" href="gid-shared.css">
<style>
.header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200}
.header-left{display:flex;align-items:center;gap:10px}
.gid-logo{width:32px;height:32px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.header-title h1{font-size:15px;font-weight:700}
.header-title p{font-size:11px;color:var(--muted)}
.header-actions{display:flex;gap:6px;align-items:center}
.live-badge{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;background:var(--green-lt);border:1px solid var(--green-mid);font-size:11px;font-weight:600;color:var(--green)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);transition:background .3s}
.btn{padding:6px 14px;border-radius:var(--radius);border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-outline{background:var(--white);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:4px 10px;font-size:12px}

/* FILTER ROW */
.filter-row{background:var(--white);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-chip{padding:4px 12px;border-radius:999px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.filter-chip:hover{border-color:var(--blue);color:var(--blue)}
.filter-chip.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:600}
.filter-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filter-sep{width:1px;height:16px;background:var(--border);margin:0 4px;flex-shrink:0}

/* VIEW TABS */
.view-tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;height:40px;align-items:flex-end;gap:0}
.view-tab{padding:8px 14px;border-radius:var(--radius) var(--radius) 0 0;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit;border:1px solid transparent;border-bottom:none;background:transparent;position:relative;bottom:-1px;transition:all .12s}
.view-tab:hover{color:var(--text)}
.view-tab.active{color:var(--text);background:var(--white);border-color:var(--border);font-weight:600}

/* CONTENT */
.content{padding:20px 24px}
.table-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.table-title{font-size:14px;font-weight:700}
.table-sub{font-size:12px;color:var(--muted);margin-left:8px}
.filter-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:var(--blue-lt);color:var(--blue);font-size:11px;font-weight:600;margin-left:6px;cursor:pointer;border:none;font-family:inherit}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer;transition:background .1s}
tr.clickable:hover{background:var(--bg)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px;color:var(--hint)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-lt);color:var(--green)}
.badge-amber{background:var(--amber-lt);color:var(--amber)}
.badge-red{background:var(--red-lt);color:var(--red)}
.badge-blue{background:var(--blue-lt);color:var(--blue)}
.badge-gray{background:var(--border);color:var(--muted)}

/* RISK BAR */
.risk-wrap{display:flex;align-items:center;gap:8px}
.risk-bar{flex:1;height:5px;border-radius:3px;background:var(--border);max-width:80px}
.risk-fill{height:5px;border-radius:3px}
.risk-num{font-size:12px;font-weight:600;min-width:24px}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:flex;justify-content:flex-end}
.drawer-overlay.hidden{display:none}
.drawer-panel{width:340px;height:100%;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.drawer-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drawer-title{font-size:15px;font-weight:700}
.drawer-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:2px 6px;border-radius:var(--radius)}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px}
.drawer-metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.drawer-metric-cell{padding:12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border2)}
.drawer-metric-cell .metric-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.drawer-metric-cell .metric-value{font-size:22px;font-weight:700}
.drawer-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px}
.drawer-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2)}
.drawer-row:last-child{border-bottom:none}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;display:flex;align-items:center;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--white);border-radius:var(--radius-xl);width:420px;max-width:95vw;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:15px;font-weight:700}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:600;color:var(--muted)}
.form-input,.form-select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;width:100%}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--blue)}

.mono{font-family:ui-monospace,monospace;font-size:12px}
.text-muted{color:var(--muted)}
.text-hint{color:var(--hint)}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="gid-logo">GID</div>
    <div class="header-title">
      <h1 id="bu-name">Loading…</h1>
      <p>ho admin · <span id="user-email"></span></p>
    </div>
  </div>
  <div class="header-actions">
    <div class="live-badge"><span class="live-dot" id="live-dot"></span><span id="live-label">Live</span></div>
    <button class="btn btn-outline btn-sm" onclick="location.href='ho.html'">HO view</button>
    <button class="btn btn-outline btn-sm" onclick="gotoStore()">Store portal</button>
    <button class="btn btn-outline btn-sm" onclick="location.href='hr-upload.html'">HR Upload</button>
    <button class="btn btn-outline btn-sm" onclick="switchBU()">Switch BU</button>
    <button class="btn btn-primary btn-sm" onclick="openAddUser()">+ User</button>
    <button class="btn btn-outline btn-sm" onclick="doSignOut()">Sign out</button>
  </div>
</div>

<!-- METRICS BAR (from gid-shared.css) -->
<div class="metrics-bar" id="metrics-bar"></div>

<!-- FILTER ROW -->
<div class="filter-row" id="filter-row"></div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <button class="view-tab active" id="tab-ids"    onclick="setView('ids')">Generic IDs</button>
  <button class="view-tab"        id="tab-store"  onclick="setView('store')">Stores</button>
  <button class="view-tab"        id="tab-app"    onclick="setView('app')">By application</button>
  <button class="view-tab"        id="tab-people" onclick="setView('people')">People</button>
  <button class="view-tab"        id="tab-risk"   onclick="setView('risk')">Risk area</button>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="table-card">
    <div class="table-header">
      <div style="display:flex;align-items:baseline;gap:0">
        <span class="table-title" id="table-title">Generic IDs</span>
        <span class="table-sub"   id="table-sub"></span>
        <button class="filter-pill hidden" id="filter-pill" onclick="clearMetric()">× clear filter</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="gotoStore()">+ Grant access</button>
        <button class="btn btn-outline btn-sm" onclick="openAuditLog()">Audit log ↗</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
    </div>
  </div>
</div>

<!-- SIDE DRAWER -->
<div class="drawer-overlay hidden" id="drawer" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer-panel">
    <div class="drawer-header">
      <span class="drawer-title" id="drawer-title">Detail</span>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<!-- MODAL: Add User -->
<div class="modal-bg hidden" id="modal-user">
  <div class="modal">
    <div class="modal-header">
      <h3>Add User</h3>
      <button class="drawer-close" onclick="closeUserModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Email</label>
        <input class="form-input" id="u-email" type="email" placeholder="user@company.com"></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-select" id="u-role">
          <option value="bu_admin">BU Admin</option>
          <option value="store_manager">Store Manager</option>
          <option value="viewer">Viewer</option>
        </select></div>
      <div class="form-group"><label class="form-label">Store (optional)</label>
        <select class="form-select" id="u-store"><option value="">— All stores —</option></select></div>
      <p class="hidden" id="u-err" style="color:var(--red);font-size:12px"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeUserModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitUser()">Add User</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="employee-cache.js"></script>
<script>
const SUPABASE_URL='https://hnvytilmxoiaqceseooh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhudnl0aWxteG9pYXFjZXNlb29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTc0ODIsImV4cCI6MjA4OTQ5MzQ4Mn0.x7WCLXRZEoorxEIuk5dwHG8EpasBGGB7peBysWUdElw';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const APP_COLORS={POS:'#1D4ED8',GR:'#15803D',ST:'#B45309',FP:'#B91C1C',default:'#6B6B6B'};

let SESSION=null,BU_ID=null,BU=null;
let STORES=[],APPS=[],ASSIGNMENTS=[],EMPLOYEES=[];
let CUR_VIEW='ids',CUR_STORE=null,CUR_APP=null,CUR_METRIC=null;

/* ── SINGLE FILTER SOURCE ── */
function filteredAsn(){
  let a=ASSIGNMENTS;
  if(CUR_STORE)                  a=a.filter(x=>x.store_id===CUR_STORE);
  if(CUR_APP)                    a=a.filter(x=>x.app?.code===CUR_APP);
  if(CUR_METRIC==='active')      a=a.filter(x=>x.status==='active');
  else if(CUR_METRIC==='pw_overdue') a=a.filter(x=>isPwOverdue(x));
  else if(CUR_METRIC==='risk')   a=a.filter(x=>['at_risk','orphan'].includes(x.status));
  return a;
}
function isPwOverdue(a){
  if(!a.pw_last_rotated)return false;
  return Math.floor((Date.now()-new Date(a.pw_last_rotated))/(864e5))>=(a.app?.pw_rotation_days||30);
}

/* ── INIT ── */
async function init(){
  let{data:{session}}=await sb.auth.getSession();
  if(!session){const{data:r}=await sb.auth.refreshSession();session=r?.session;}
  if(!session){location.href='index.html';return;}
  SESSION=session;
  EMP_CACHE.init(sb,SUPABASE_URL);
  document.getElementById('user-email').textContent=session.user.email||'';

  BU_ID=sessionStorage.getItem('gid_bu_id');
  if(!BU_ID){
    const{data:roles}=await sb.from('user_roles').select('bu_id').eq('user_id',session.user.id).limit(1);
    BU_ID=roles?.[0]?.bu_id;
    if(!BU_ID){location.href='ho.html';return;}
    sessionStorage.setItem('gid_bu_id',BU_ID);
  }
  await loadAll();
}

async function loadAll(){
  setSyncing(true);
  const[buR,stR,apR]=await Promise.all([
    sb.from('business_units').select('*').eq('id',BU_ID).single(),
    sb.from('stores').select('*').eq('bu_id',BU_ID).eq('active',true).order('code'),
    sb.from('apps').select('*').eq('bu_id',BU_ID).eq('active',true).order('code')
  ]);
  BU=buR.data;STORES=stR.data||[];APPS=apR.data||[];
  document.getElementById('bu-name').textContent=BU?.name||'BU Dashboard';

  if(STORES.length){
    const[asnR,empR]=await Promise.all([
      sb.from('generic_id_assignments')
        .select('id,store_id,app_id,generic_id,status,pw_last_rotated,emp_code,supervisor_emp_code')
        .in('store_id',STORES.map(s=>s.id)),
      sb.from('employees').select('id,emp_code,status,store_id').eq('bu_id',BU_ID)
    ]);
    EMPLOYEES=empR.data||[];
    // Annotate with app info from APPS array (avoids RLS join issues)
    const appById={};APPS.forEach(a=>{appById[a.id]=a;});
    ASSIGNMENTS=(asnR.data||[]).map(a=>({...a,app:appById[a.app_id]||null}));
    const codes=[...new Set(EMPLOYEES.map(e=>e.emp_code).filter(Boolean))];
    if(codes.length) EMP_CACHE.getBatch(codes);
  }

  document.getElementById('u-store').innerHTML=
    '<option value="">— All stores —</option>'+
    STORES.map(s=>`<option value="${s.id}">${s.code} ${s.name}</option>`).join('');

  renderFilters();renderMetrics();renderView();
  setSyncing(false);
}

function setSyncing(v){
  const dot=document.getElementById('live-dot'),lbl=document.getElementById('live-label');
  dot.style.background=v?'#D97706':'';
  lbl.textContent=v?'Syncing…':'Live';
}

/* ── FILTER CONTROLS ── */
function renderFilters(){
  document.getElementById('filter-row').innerHTML=
    `<button class="filter-chip${!CUR_STORE?' active':''}" onclick="setStore(null)">All stores</button>`+
    STORES.map(s=>`<button class="filter-chip${CUR_STORE===s.id?' active':''}" onclick="setStore('${s.id}')">${s.code}</button>`).join('')+
    `<div class="filter-sep"></div>`+
    `<button class="filter-chip${!CUR_APP?' active':''}" onclick="setAppFilter(null)">All apps</button>`+
    APPS.map(a=>`<button class="filter-chip${CUR_APP===a.code?' active':''}" onclick="setAppFilter('${a.code}')"><span class="filter-chip-dot" style="background:${APP_COLORS[a.code]||APP_COLORS.default}"></span>${a.name}</button>`).join('');
}

function setStore(id){CUR_STORE=id;CUR_METRIC=null;renderFilters();renderMetrics();renderView();}
function setAppFilter(code){CUR_APP=code;CUR_METRIC=null;renderFilters();renderMetrics();renderView();}

function setMetric(f){
  // 'all' = Total IDs = clear any metric filter
  if(f==='all'){CUR_METRIC=null;}
  else{CUR_METRIC=(CUR_METRIC===f)?null:f;}
  // Always switch to Generic IDs tab so filtered records are visible
  if(CUR_METRIC){
    CUR_VIEW='ids';
    ['ids','store','app','people','risk'].forEach(x=>
      document.getElementById('tab-'+x)?.classList.toggle('active',x==='ids'));
  }
  renderMetrics();renderView();
}
function clearMetric(){CUR_METRIC=null;renderMetrics();renderView();}

/* ── METRICS BAR ── */
function renderMetrics(){
  // Counts always from store+app filtered but NOT metric filtered (so numbers reflect total)
  let base=ASSIGNMENTS;
  if(CUR_STORE) base=base.filter(a=>a.store_id===CUR_STORE);
  if(CUR_APP)   base=base.filter(a=>a.app?.code===CUR_APP);
  const total=base.length;
  const active=base.filter(a=>a.status==='active').length;
  const empCount=CUR_STORE?EMPLOYEES.filter(e=>e.store_id===CUR_STORE).length:EMPLOYEES.length;
  const pwDue=base.filter(a=>isPwOverdue(a)).length;
  const risk=base.filter(a=>['at_risk','orphan'].includes(a.status)).length;

  const mk=(label,val,cls,f)=>`
    <div class="metric-cell${CUR_METRIC===f?' active-filter':''}" onclick="setMetric('${f}')" style="cursor:pointer">
      <div class="metric-label">${label}</div>
      <div class="metric-value ${cls}">${val}</div>
    </div><div class="metric-divider"></div>`;

  document.getElementById('metrics-bar').innerHTML=
    `<div class="metric-cell" onclick="setView('store')" style="cursor:pointer">
      <div class="metric-label">Stores</div><div class="metric-value mv-default">${CUR_STORE?1:STORES.length}</div>
    </div><div class="metric-divider"></div>`+
    `<div class="metric-cell" onclick="setView('people')" style="cursor:pointer">
      <div class="metric-label">Employees</div><div class="metric-value mv-default">${empCount}</div>
    </div><div class="metric-divider"></div>`+
    mk('Total IDs',total,'mv-blue','all')+
    mk('Active IDs',active,'mv-green','active')+
    mk('Pw overdue',pwDue,pwDue?'mv-amber':'mv-default','pw_overdue')+
    `<div class="metric-cell${CUR_METRIC==='risk'?' active-filter':''}" onclick="setMetric('risk')" style="cursor:pointer">
      <div class="metric-label">Risk alerts</div><div class="metric-value ${risk?'mv-red':'mv-default'}">${risk}</div>
    </div>`;

  const pill=document.getElementById('filter-pill');
  if(CUR_METRIC){
    const labels={all:'All IDs',active:'Active',pw_overdue:'Pw overdue',risk:'Risk alerts'};
    pill.textContent=`${labels[CUR_METRIC]||CUR_METRIC} × clear`;
    pill.classList.remove('hidden');
  } else pill.classList.add('hidden');
}

/* ── VIEW ROUTING ── */
function setView(v,skipMetrics){
  CUR_VIEW=v;
  ['ids','store','app','people','risk'].forEach(x=>
    document.getElementById('tab-'+x)?.classList.toggle('active',x===v));
  if(!skipMetrics)renderMetrics();
  renderView();
}
function renderView(){
  if(CUR_VIEW==='ids')         renderAllIDs();
  else if(CUR_VIEW==='store')  renderByStore();
  else if(CUR_VIEW==='app')    renderByApp();
  else if(CUR_VIEW==='people') renderPeople();
  else                         renderRisk();
}

/* ── VIEW: ALL GENERIC IDs ── */
function renderAllIDs(){
  const asn=filteredAsn();
  document.getElementById('table-title').textContent='Generic IDs';
  document.getElementById('table-sub').textContent=`${asn.length} record${asn.length!==1?'s':''}`;
  document.getElementById('table-head').innerHTML=`<tr>
    <th>Generic ID</th><th>App</th><th>Store</th><th>Assigned to</th>
    <th>Employee ID</th><th>Supervisor</th><th>Pw age</th><th>Status</th><th></th></tr>`;
  if(!asn.length){
    document.getElementById('table-body').innerHTML=`<tr><td colspan="9">
      <div class="empty-state"><div class="empty-icon">🔑</div><div class="empty-text">No IDs found</div></div></td></tr>`;
    return;
  }
  document.getElementById('table-body').innerHTML=asn.map(a=>{
    const store=STORES.find(s=>s.id===a.store_id);
    const app=APPS.find(ap=>ap.id===a.app_id);
    const appCode=app?.code||a.app?.code||'';
    const appColor=APP_COLORS[appCode]||APP_COLORS.default;
    const empName=EMP_CACHE.getName(a.emp_code)||a.emp_code||'';
    const supName=a.supervisor_emp_code?(EMP_CACHE.getName(a.supervisor_emp_code)||a.supervisor_emp_code):'—';
    const pwDays=a.pw_last_rotated?Math.floor((Date.now()-new Date(a.pw_last_rotated))/(864e5)):null;
    const pwMax=a.app?.pw_rotation_days||30;
    const overdue=pwDays!==null&&pwDays>=pwMax;
    const statusBadge=
      a.status==='active'?`<span class="badge badge-green">● Active</span>`:
      a.status==='disabled'?`<span class="badge badge-gray">Disabled</span>`:
      a.status==='idle'?`<span class="badge badge-amber">Idle</span>`:
      '<span class="badge badge-red">'+(typeof a.status!=='undefined'?a.status:'')+('</span>');
    return `<tr class="clickable" onclick="openManageDrawer('${a.id}')">
      <td><span class="mono" style="font-weight:600">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${appColor};margin-right:5px;vertical-align:middle"></span>${a.generic_id}
      </span></td>
      <td><span style="font-size:12px;color:${appColor};font-weight:600">${app?.name||a.app?.name||appCode||'—'}</span></td>
      <td>${store?`<strong>${store.code}</strong> <span class="text-muted">${store.name}</span>`:'—'}</td>
      <td>${a.emp_code?`<span style="font-weight:500">${empName||a.emp_code}</span>`:'<span class="text-hint">Unassigned</span>'}</td>
      <td class="mono text-muted">${a.emp_code||'—'}</td>
      <td class="text-muted">${supName}</td>
      <td style="${overdue?'color:var(--red);font-weight:600':''}">${pwDays!==null?pwDays+'d':'—'}${overdue?' ⚠':''}</td>
      <td>${statusBadge}</td>
      <td class="text-hint">→</td>
    </tr>`;
  }).join('');
  // Re-fetch names once, then re-render
  const codes=[...new Set(asn.flatMap(a=>[a.emp_code,a.supervisor_emp_code].filter(Boolean)))];
  if(codes.length) EMP_CACHE.getBatch(codes).then(()=>{if(CUR_VIEW==='ids'&&!_rerendering){_rerendering=true;renderAllIDs();setTimeout(()=>{_rerendering=false;},300);}});
}
let _rerendering=false;

/* ── VIEW: BY STORE ── */
function renderByStore(){
  const allFiltered=filteredAsn();
  const storeIdsWithData=new Set(allFiltered.map(a=>a.store_id));
  let stores=CUR_STORE?STORES.filter(s=>s.id===CUR_STORE):STORES;
  if(CUR_METRIC) stores=stores.filter(s=>storeIdsWithData.has(s.id));

  document.getElementById('table-title').textContent='Stores';
  document.getElementById('table-sub').textContent=`${stores.length} store${stores.length!==1?'s':''}`;
  document.getElementById('table-head').innerHTML=`<tr>
    <th>Store</th><th>Region</th><th>Total IDs</th><th>Active</th>
    <th>Pw overdue</th><th>Risk</th><th>Risk score</th><th></th></tr>`;

  if(!stores.length){
    document.getElementById('table-body').innerHTML=`<tr><td colspan="8">
      <div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-text">No stores found</div></div></td></tr>`;
    return;
  }
  const rows=stores.map(s=>{
    let asn=ASSIGNMENTS.filter(a=>a.store_id===s.id);
    if(CUR_APP) asn=asn.filter(a=>a.app?.code===CUR_APP);
    const filteredCount=allFiltered.filter(a=>a.store_id===s.id).length;
    const active=asn.filter(a=>a.status==='active').length;
    const pwDue=asn.filter(a=>isPwOverdue(a)).length;
    const risk=asn.filter(a=>['at_risk','orphan'].includes(a.status)).length;
    const score=Math.min(100,pwDue*4+risk*15);
    const scoreColor=score>=70?'var(--red)':score>=30?'var(--amber)':'var(--green)';
    return{s,filteredCount,fullCount:asn.length,active,pwDue,risk,score,scoreColor};
  }).sort((a,b)=>b.score-a.score);

  document.getElementById('table-body').innerHTML=rows.map(({s,filteredCount,fullCount,active,pwDue,risk,score,scoreColor})=>`
    <tr class="clickable" onclick="gotoStorePortal('${s.id}','${s.name}')">
      <td style="font-weight:600">${s.name}</td>
      <td class="text-muted">${s.region||'—'}</td>
      <td style="font-weight:600">${CUR_METRIC?filteredCount:fullCount}</td>
      <td style="color:var(--green);font-weight:600">${active}</td>
      <td>${pwDue?'<span class="badge badge-amber">'+(typeof pwDue!=='undefined'?pwDue:'')+('</span>'):'<span class="text-hint">0</span>'}</td>
      <td>${risk?'<span class="badge badge-red">'+(typeof risk!=='undefined'?risk:'')+('</span>'):'<span class="text-hint">0</span>'}</td>
      <td><div class="risk-wrap">
        <div class="risk-bar"><div class="risk-fill" style="width:${score}%;background:${scoreColor}"></div></div>
        <span class="risk-num" style="color:${scoreColor}">${score}</span>
      </div></td>
      <td class="text-hint">→</td>
    </tr>`).join('');
}

/* ── VIEW: BY APPLICATION ── */
function renderByApp(){
  document.getElementById('table-title').textContent='Applications';
  document.getElementById('table-sub').textContent='';
  document.getElementById('table-head').innerHTML=`<tr>
    <th>Application</th><th>Stores</th><th>Total IDs</th>
    <th>Active</th><th>Pw overdue</th><th>Risk</th><th></th></tr>`;
  const storeScope=CUR_STORE?[CUR_STORE]:STORES.map(s=>s.id);
  document.getElementById('table-body').innerHTML=APPS.map(a=>{
    let asn=ASSIGNMENTS.filter(x=>x.app?.code===a.code&&storeScope.includes(x.store_id));
    if(CUR_METRIC==='active')      asn=asn.filter(x=>x.status==='active');
    else if(CUR_METRIC==='pw_overdue') asn=asn.filter(x=>isPwOverdue(x));
    else if(CUR_METRIC==='risk')   asn=asn.filter(x=>['at_risk','orphan'].includes(x.status));
    const active=asn.filter(x=>x.status==='active').length;
    const pwDue=asn.filter(x=>isPwOverdue(x)).length;
    const risk=asn.filter(x=>['at_risk','orphan'].includes(x.status)).length;
    const storeCount=new Set(asn.map(x=>x.store_id)).size;
    const color=APP_COLORS[a.code]||APP_COLORS.default;
    return `<tr class="clickable" onclick="openAppDrawer('${a.code}')">
      <td><span style="display:inline-flex;align-items:center;gap:8px">
        <span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></span>
        <strong>${a.name}</strong></span></td>
      <td class="text-muted">${storeCount}</td>
      <td style="font-weight:600">${asn.length}</td>
      <td style="color:var(--green);font-weight:600">${active}</td>
      <td>${pwDue?'<span class="badge badge-amber">'+(typeof pwDue!=='undefined'?pwDue:'')+('</span>'):'<span class="text-hint">0</span>'}</td>
      <td>${risk?'<span class="badge badge-red">'+(typeof risk!=='undefined'?risk:'')+('</span>'):'<span class="text-hint">0</span>'}</td>
      <td class="text-hint">→</td>
    </tr>`;
  }).join('');
}

/* ── VIEW: PEOPLE ── */
function renderPeople(){
  const filteredIDs=filteredAsn();
  const filteredCodes=new Set(filteredIDs.map(a=>a.emp_code).filter(Boolean));
  let emps=CUR_STORE?EMPLOYEES.filter(e=>e.store_id===CUR_STORE):EMPLOYEES;
  if(CUR_METRIC) emps=emps.filter(e=>filteredCodes.has(e.emp_code));

  document.getElementById('table-title').textContent='Employees';
  document.getElementById('table-sub').textContent=`${emps.length} employee${emps.length!==1?'s':''}`;
  document.getElementById('table-head').innerHTML=`<tr>
    <th>Employee code</th><th>Name</th><th>Store</th><th>Status</th><th>Generic IDs</th></tr>`;
  document.getElementById('table-body').innerHTML=emps.length?emps.map(e=>{
    const store=STORES.find(s=>s.id===e.store_id);
    const asn=filteredIDs.filter(a=>a.emp_code===e.emp_code);
    const allAsn=ASSIGNMENTS.filter(a=>a.emp_code===e.emp_code);
    const name=EMP_CACHE.getName(e.emp_code)||'';
    return `<tr>
      <td class="mono">${e.emp_code}</td>
      <td style="font-weight:${name?'500':'400'};color:${name?'var(--text)':'var(--hint)'}">${name||'—'}</td>
      <td class="text-muted">${store?.name||'—'}</td>
      <td><span class="badge badge-${e.status==='active'?'green':'gray'}">${e.status}</span></td>
      <td>${asn.length
        ?asn.map(a=>`<span class="badge badge-blue mono" style="margin-right:3px">${a.generic_id}</span>`).join('')
        :(allAsn.length?`<span class="text-hint">${allAsn.length} ID${allAsn.length>1?'s':''} (filtered)</span>`:'<span class="text-hint">—</span>')
      }</td></tr>`;
  }).join(''):`<tr><td colspan="5">
    <div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">No employees found</div></div></td></tr>`;
}

/* ── VIEW: RISK ── */
function renderRisk(){
  let asn=ASSIGNMENTS;
  if(CUR_STORE) asn=asn.filter(a=>a.store_id===CUR_STORE);
  if(CUR_APP)   asn=asn.filter(a=>a.app?.code===CUR_APP);
  const items=[
    ...asn.filter(a=>a.status==='orphan').map(a=>({icon:'⛔',label:'Orphan session',bg:'var(--red-lt)',a})),
    ...asn.filter(a=>a.status==='at_risk').map(a=>({icon:'⚠️',label:'Supervisor resigned',bg:'var(--amber-lt)',a})),
    ...asn.filter(a=>a.status==='active'&&isPwOverdue(a)).map(a=>({icon:'🔑',label:'Password overdue',bg:'',a})),
  ];
  document.getElementById('table-title').textContent='Risk area';
  document.getElementById('table-sub').textContent=`${items.length} item${items.length!==1?'s':''}`;
  document.getElementById('table-head').innerHTML=`<tr><th>Risk</th><th>Generic ID</th><th>Store</th><th>App</th><th>Employee</th><th>Days over</th></tr>`;
  document.getElementById('table-body').innerHTML=items.length?items.map(({icon,label,bg,a})=>{
    const store=STORES.find(s=>s.id===a.store_id);
    const days=a.pw_last_rotated?Math.floor((Date.now()-new Date(a.pw_last_rotated))/(864e5)):null;
    const pwMax=a.app?.pw_rotation_days||30;
    return `<tr style="${bg?'background:'+bg:''}">
      <td>${icon} <span style="font-size:12px;font-weight:600">${label}</span></td>
      <td class="mono">${a.generic_id}</td>
      <td class="text-muted">${store?.name||'—'}</td>
      <td class="text-muted">${a.app?.name||'—'}</td>
      <td class="mono">${a.emp_code||'—'}</td>
      <td class="text-muted">${days!==null?`${days-pwMax}d`:'—'}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="6">
    <div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No open risks</div></div></td></tr>`;
}

/* ── APP DRAWER ── */
function openAppDrawer(code){
  const app=APPS.find(x=>x.code===code);if(!app)return;
  const storeScope=CUR_STORE?[CUR_STORE]:STORES.map(s=>s.id);
  const asn=ASSIGNMENTS.filter(x=>x.app?.code===code&&storeScope.includes(x.store_id));
  const color=APP_COLORS[code]||APP_COLORS.default;
  document.getElementById('drawer-title').textContent=app.name;
  document.getElementById('drawer-body').innerHTML=`
    <div class="drawer-metric-grid">
      <div class="drawer-metric-cell"><div class="metric-label">Total</div><div class="metric-value" style="color:${color}">${asn.length}</div></div>
      <div class="drawer-metric-cell"><div class="metric-label">Active</div><div class="metric-value mv-green">${asn.filter(x=>x.status==='active').length}</div></div>
      <div class="drawer-metric-cell"><div class="metric-label">Idle</div><div class="metric-value mv-amber">${asn.filter(x=>x.status==='idle').length}</div></div>
      <div class="drawer-metric-cell"><div class="metric-label">Risk</div><div class="metric-value mv-red">${asn.filter(x=>['at_risk','orphan'].includes(x.status)).length}</div></div>
    </div>
    <div class="drawer-section-title">By store</div>
    ${STORES.map(s=>{
      const c=asn.filter(x=>x.store_id===s.id);
      if(!c.length)return'';
      return `<div class="drawer-row">
        <span>${s.name}</span>
        <div class="drawer-row-badges">
          <span class="badge badge-gray">${c.length}</span>
          <span class="badge badge-green">${c.filter(x=>x.status==='active').length} active</span>
        </div></div>`;
    }).join('')}`;
  document.getElementById('drawer').classList.remove('hidden');
}

/* ── MANAGE DRAWER ── */
function openManageDrawer(asnId){
  const a=ASSIGNMENTS.find(x=>x.id===asnId);if(!a)return;
  const store=STORES.find(s=>s.id===a.store_id);
  const empName=EMP_CACHE.getName(a.emp_code)||a.emp_code||'—';
  const supName=a.supervisor_emp_code?(EMP_CACHE.getName(a.supervisor_emp_code)||a.supervisor_emp_code):'—';
  const color=APP_COLORS[a.app?.code]||APP_COLORS.default;
  const pwDays=a.pw_last_rotated?Math.floor((Date.now()-new Date(a.pw_last_rotated))/(864e5)):null;
  document.getElementById('drawer-title').textContent=a.generic_id;
  document.getElementById('drawer-body').innerHTML=`
    <div class="drawer-metric-grid">
      <div class="drawer-metric-cell"><div class="metric-label">Status</div>
        <div style="margin-top:6px"><span class="badge badge-${a.status==='active'?'green':a.status==='idle'?'amber':'red'}">${a.status}</span></div></div>
      <div class="drawer-metric-cell"><div class="metric-label">App</div>
        <div style="margin-top:6px;font-weight:600;color:${color};font-size:13px">${a.app?.name||'—'}</div></div>
    </div>
    <div class="drawer-section-title">Assignment</div>
    <div class="drawer-row"><span>Store</span><span>${store?.name||'—'}</span></div>
    <div class="drawer-row"><span>Employee</span><span>${empName}</span></div>
    <div class="drawer-row"><span>Emp code</span><span class="mono">${a.emp_code||'—'}</span></div>
    <div class="drawer-row"><span>Supervisor</span><span>${supName}</span></div>
    <div class="drawer-section-title">Password</div>
    <div class="drawer-row"><span>Last rotated</span><span>${a.pw_last_rotated?new Date(a.pw_last_rotated).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—'}</span></div>
    <div class="drawer-row"><span>Age</span><span style="${pwDays&&isPwOverdue(a)?'color:var(--red);font-weight:600':''}">${pwDays!==null?pwDays+'d':'—'}${isPwOverdue(a)?' ⚠':''}</span></div>
    <div style="margin-top:20px">
      <button class="btn btn-outline" style="width:100%;justify-content:center" onclick="gotoStorePortal('${a.store_id}','${store?.name||''}')">Open in Store Portal →</button>
    </div>`;
  document.getElementById('drawer').classList.remove('hidden');
}
function closeDrawer(){document.getElementById('drawer').classList.add('hidden');}

/* ── USER MODAL ── */
function openAddUser(){document.getElementById('modal-user').classList.remove('hidden');}
function closeUserModal(){document.getElementById('modal-user').classList.add('hidden');}
async function submitUser(){
  const email=document.getElementById('u-email').value.trim();
  if(!email){
    document.getElementById('u-err').textContent='Email required';
    document.getElementById('u-err').classList.remove('hidden');return;
  }
  alert(`User invite sent to ${email}.\n(Full implementation requires create-user Edge Function)`);
  closeUserModal();
}

/* ── AUDIT LOG ── */
function openAuditLog(){
  document.getElementById('drawer-title').textContent='Audit Log';
  document.getElementById('drawer-body').innerHTML=`
    <p style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">Open Store Portal for per-store audit trail.</p>
    <button class="btn btn-outline" style="width:100%;justify-content:center" onclick="gotoStore()">Open Store Portal →</button>`;
  document.getElementById('drawer').classList.remove('hidden');
}

/* ── NAV ── */
function gotoStore(){sessionStorage.removeItem('gid_store_id');location.href='store.html';}
function gotoStorePortal(id,name){
  sessionStorage.setItem('gid_store_id',id);
  sessionStorage.setItem('gid_store_name',name);
  sessionStorage.setItem('gid_bu_id',BU_ID);
  location.href='store.html';
}
function switchBU(){sessionStorage.removeItem('gid_bu_id');location.href='ho.html';}
async function doSignOut(){await sb.auth.signOut();sessionStorage.clear();location.href='index.html';}

init();
</script>
