<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BU Dashboard">
<meta name="theme-color" content="#1C1C1E">
<title>BU Dashboard — Generic ID Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --blue:#0A84FF;--blue-lt:rgba(10,132,255,.14);--blue-dk:#0060DF;
  --green:#30D158;--green-lt:rgba(48,209,88,.14);--green-dk:#248A3D;
  --red:#FF453A;--red-lt:rgba(255,69,58,.14);--red-dk:#C0392B;
  --amber:#FF9F0A;--amber-lt:rgba(255,159,10,.14);--amber-dk:#B25000;
  --purple:#BF5AF2;--purple-lt:rgba(191,90,242,.14);--purple-dk:#8944AB;
  --teal:#5AC8FA;--teal-lt:rgba(90,200,250,.14);
  --glass-bg:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.5);
  --glass-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08);
  --glass-blur:saturate(180%) blur(24px);
  --bg:linear-gradient(160deg,#E8F4FF 0%,#F0EBF8 50%,#E6F7F0 100%);
  --surface:rgba(255,255,255,.82);--surface2:rgba(255,255,255,.55);
  --text:#1C1C1E;--muted:#636366;--hint:#AEAEB2;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.05);
  --radius:14px;--radius-lg:20px;--radius-xl:28px;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){
  :root{
    --glass-bg:rgba(28,28,30,.78);--glass-border:rgba(255,255,255,.12);
    --glass-shadow:0 8px 32px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);
    --bg:linear-gradient(160deg,#0D1B2A 0%,#1A0D2E 50%,#0A1F17 100%);
    --surface:rgba(44,44,46,.88);--surface2:rgba(58,58,60,.7);
    --text:#F2F2F7;--muted:#AEAEB2;--hint:#636366;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.06);
    --blue-lt:rgba(10,132,255,.2);--green-lt:rgba(48,209,88,.2);
    --red-lt:rgba(255,69,58,.2);--amber-lt:rgba(255,159,10,.2);--purple-lt:rgba(191,90,242,.2);
  }
}
html{height:100%;background:var(--bg)}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Arial,sans-serif;padding-bottom:calc(80px + var(--safe-bottom))}

/* GLASS */
.glass{background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow)}

/* NAV */
.topnav{position:sticky;top:0;z-index:300;padding:calc(var(--safe-top) + 12px) 16px 12px;background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-bottom:0.5px solid var(--glass-border)}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;gap:10px}
.nav-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0A84FF,#5AC8FA);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.nav-info{flex:1;min-width:0}
.nav-title{font-size:17px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sub{font-size:12px;color:var(--muted);margin-top:1px}
.nav-actions{display:flex;align-items:center;gap:6px}
.sync-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:var(--green-lt);border:0.5px solid rgba(48,209,88,.3);font-size:11px;font-weight:600;color:var(--green-dk)}
.sync-pill.syncing{background:var(--amber-lt);border-color:rgba(255,159,10,.3);color:var(--amber-dk)}
.sync-pill.error{background:var(--red-lt);border-color:rgba(255,69,58,.3);color:var(--red-dk)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sync-pill.syncing .sync-dot{animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BU SWITCHER */
.bu-switcher-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;margin:12px 16px 0;border-radius:var(--radius-lg);background:var(--surface2);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:0.5px solid var(--glass-border)}
.bu-switcher-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.bu-switcher-bar select{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}

/* TABS */
.tab-chips{display:flex;gap:4px;overflow-x:auto;padding:0 16px 4px;margin-top:14px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tab-chips::-webkit-scrollbar{display:none}
.tab-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:var(--surface2);color:var(--muted);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:0.5px solid var(--glass-border);transition:all .18s}
.tab-chip.active{background:var(--blue);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(10,132,255,.35)}
.tab-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* METRICS SCROLL */
.metrics-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;margin-top:16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.metrics-scroll::-webkit-scrollbar{display:none}
.mcard{flex-shrink:0;width:130px;padding:14px 16px;border-radius:var(--radius-lg);background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow)}
.mcard-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.mcard-value{font-size:28px;font-weight:700;line-height:1}
.mcard-value.blue{color:var(--blue)}.mcard-value.green{color:var(--green-dk)}.mcard-value.red{color:var(--red-dk)}.mcard-value.amber{color:var(--amber-dk)}

/* SECTION */
.section{padding:0 16px;margin-top:20px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* GLASS CARD */
.gcard{border-radius:var(--radius-lg);background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow);overflow:hidden;margin-bottom:12px}
.gcard-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border2);gap:10px;flex-wrap:wrap}
.gcard-title{font-size:16px;font-weight:700}
.gcard-body{padding:16px}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--radius);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:7px}
.btn:active{transform:scale(.97);opacity:.85}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(10,132,255,.3)}
.btn-green{background:var(--green-dk);color:#fff}
.btn-red{background:var(--red-dk);color:#fff}
.btn-purple{background:var(--purple-dk);color:#fff}
.btn-glass{background:var(--surface2);color:var(--text);border:0.5px solid var(--glass-border);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-xs{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
.b-ok{background:var(--green-lt);color:var(--green-dk)}.b-warn{background:var(--amber-lt);color:var(--amber-dk)}
.b-danger{background:var(--red-lt);color:var(--red-dk)}.b-info{background:var(--blue-lt);color:var(--blue-dk)}
.b-neutral{background:var(--surface2);color:var(--muted)}.b-purple{background:var(--purple-lt);color:var(--purple-dk)}
.b-active{background:var(--green-lt);color:var(--green-dk)}.b-disabled{background:var(--red-lt);color:var(--red-dk)}
.b-atrisk{background:var(--amber-lt);color:var(--amber-dk)}

/* RISK CARDS */
.risk-card{border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;border:0.5px solid}
.risk-card.danger{background:var(--red-lt);border-color:rgba(255,69,58,.25);color:var(--red-dk)}
.risk-card.warn{background:var(--amber-lt);border-color:rgba(255,159,10,.25);color:var(--amber-dk)}
.risk-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.risk-title{font-size:14px;font-weight:700;margin-bottom:3px}
.risk-desc{font-size:13px;opacity:.85;line-height:1.5}

/* LIST ROWS */
.list-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border2);cursor:pointer;transition:background .12s}
.list-row:last-child{border-bottom:none}
.list-row:active{background:var(--surface2)}
.list-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;background:var(--blue-lt);color:var(--blue-dk)}
.list-info{flex:1;min-width:0}
.list-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-sub{font-size:12px;color:var(--muted);margin-top:2px}
.store-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border2);cursor:pointer;transition:background .15s}
.store-row:last-child{border-bottom:none}
.store-row:active{background:var(--surface2)}
.store-icon{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.store-info{flex:1;min-width:0}
.store-name{font-size:15px;font-weight:600}
.store-meta{font-size:12px;color:var(--muted);margin-top:2px}
.risk-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}

/* BOTTOM TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;padding:10px 8px calc(var(--safe-bottom) + 10px);background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-top:0.5px solid var(--glass-border);display:flex;gap:2px}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .15s}
.tab-item.active{color:var(--blue)}
.tab-item:active{transform:scale(.92)}
.tab-icon{font-size:22px;line-height:1}
.tab-label{font-size:10px;font-weight:500}

/* SHEET */
.sheet-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:600px;max-height:92vh;border-radius:var(--radius-xl) var(--radius-xl) 0 0;background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-top:0.5px solid var(--glass-border);overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 20px)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--hint);margin:12px auto 4px}
.sheet-header{padding:12px 20px 16px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.sheet-title{font-size:18px;font-weight:700}
.sheet-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--surface2);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.sheet-body{padding:20px}
.sheet-footer{padding:12px 20px;border-top:0.5px solid var(--border2);display:flex;gap:10px}

/* FORM */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;font-family:inherit;outline:none;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:border .15s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt)}
.field textarea{resize:vertical;min-height:80px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:360px){.two-col{grid-template-columns:1fr}}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--radius);background:var(--surface2);border:0.5px solid var(--border);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);margin-bottom:12px}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-family:inherit}
.search-bar input::placeholder{color:var(--hint)}

/* USER ROLE TAG */
.role-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.role-ho{background:var(--purple-lt);color:var(--purple-dk)}
.role-hr{background:var(--blue-lt);color:var(--blue-dk)}
.role-bu{background:var(--teal-lt);color:#0A6E8A}
.role-store{background:var(--green-lt);color:var(--green-dk)}

/* MULTI-BU CHECKBOXES */
.bu-check-list{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.bu-check-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:0.5px solid var(--border2);cursor:pointer}
.bu-check-item:last-child{border-bottom:none}
.bu-check-item:active{background:var(--surface2)}
.bu-check-item input[type=checkbox]{width:20px;height:20px;border-radius:6px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.bu-check-info{flex:1}
.bu-check-name{font-size:15px;font-weight:500}
.bu-check-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* SPINNER */
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.spinner-blue{border-color:var(--blue-lt);border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.empty{text-align:center;padding:36px 20px;color:var(--hint);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}

/* DESKTOP */
@media(min-width:768px){
  body{padding-bottom:20px}
  .tab-bar{display:none}
  .topnav{padding-top:16px}
  .metrics-scroll,.tab-chips,.section,.bu-switcher-bar{padding-left:24px;padding-right:24px}
  .section{padding:0 24px}
  .desktop-nav{display:flex!important}
}
.desktop-nav{display:none;align-items:center;gap:6px}
.desktop-nav button{padding:7px 14px;border-radius:var(--radius);border:0.5px solid var(--glass-border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.desktop-nav button:hover{background:var(--glass-bg)}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="topnav-inner">
    <div class="nav-logo">GID</div>
    <div class="nav-info">
      <div class="nav-title" id="nav-title">BU Dashboard</div>
      <div class="nav-sub" id="nav-sub">Loading…</div>
    </div>
    <div class="nav-actions">
      <div class="sync-pill" id="sync-pill"><span class="sync-dot"></span><span id="sync-label">Live</span></div>
      <div class="desktop-nav">
        <button onclick="location.href='store.html'">Store portal</button>
        <button onclick="location.href='hr-upload.html'">HR Upload</button>
        <button onclick="switchBU()">Switch BU</button>
        <button onclick="doSignOut()">Sign out</button>
      </div>
    </div>
  </div>
</nav>

<!-- BU SWITCHER (multi-BU users) -->
<div class="bu-switcher-bar hidden" id="bu-switcher">
  <span class="bu-switcher-label">BU</span>
  <select id="bu-select" onchange="onBuSwitch()"></select>
</div>

<!-- MAIN TABS -->
<div class="tab-chips" id="main-tabs">
  <button class="tab-chip active" onclick="showTab('overview')">Overview</button>
  <button class="tab-chip" onclick="showTab('stores')">Stores</button>
  <button class="tab-chip" onclick="showTab('employees')">People</button>
  <button class="tab-chip" onclick="showTab('apps')">Apps</button>
  <button class="tab-chip" onclick="showTab('users')" id="tab-users-chip" style="display:none">Users</button>
  <button class="tab-chip" onclick="showTab('risk')">Risk</button>
</div>

<!-- TAB: OVERVIEW -->
<div id="tab-overview">
  <div class="metrics-scroll" id="metrics-row"></div>
  <div class="tab-chips" id="app-filter-chips" style="margin-top:12px"></div>
  <div class="section" style="margin-top:16px">
    <div class="section-title" style="margin-bottom:10px">Open risks</div>
    <div id="risk-alerts"></div>
  </div>
  <div class="section" style="margin-top:4px">
    <div class="section-hdr">
      <div class="section-title">Stores</div>
      <button class="btn btn-blue btn-xs" onclick="showTab('stores')">See all</button>
    </div>
    <div class="gcard" id="store-summary"></div>
  </div>
</div>

<!-- TAB: STORES -->
<div id="tab-stores" class="hidden">
  <div class="section" style="margin-top:16px">
    <div class="section-hdr">
      <div class="section-title">Stores</div>
      <button class="btn btn-blue btn-sm" onclick="openSheet('sheet-store')">+ Add store</button>
    </div>
    <div class="gcard" id="stores-list"></div>
  </div>
</div>

<!-- TAB: EMPLOYEES -->
<div id="tab-employees" class="hidden">
  <div class="section" style="margin-top:16px">
    <div class="section-hdr">
      <div class="section-title">Employees</div>
      <button class="btn btn-blue btn-sm" onclick="openAddEmployee()">+ Add</button>
    </div>
    <div class="search-bar">
      <span style="color:var(--hint)">🔍</span>
      <input type="text" id="emp-search" placeholder="Search name, EMP code, mobile…" oninput="renderEmployees()">
    </div>
    <div class="tab-chips" id="emp-filter-chips" style="margin-top:0;padding-left:0;padding-right:0;margin-bottom:12px">
      <button class="tab-chip active" onclick="setEmpFilter('all')">All</button>
      <button class="tab-chip" onclick="setEmpFilter('active')">Active</button>
      <button class="tab-chip" onclick="setEmpFilter('resigned')">Resigned</button>
      <button class="tab-chip" onclick="setEmpFilter('suspended')">Suspended</button>
    </div>
    <div class="gcard" id="employees-list"></div>
  </div>
</div>

<!-- TAB: APPS -->
<div id="tab-apps" class="hidden">
  <div class="section" style="margin-top:16px">
    <div class="section-hdr">
      <div class="section-title">App registry</div>
      <button class="btn btn-blue btn-sm" onclick="openSheet('sheet-app')">+ Add app</button>
    </div>
    <div id="apps-list"></div>
  </div>
</div>

<!-- TAB: USERS (ho_admin / hr_admin only) -->
<div id="tab-users" class="hidden">
  <div class="section" style="margin-top:16px">
    <div class="section-hdr">
      <div class="section-title">User management</div>
      <button class="btn btn-purple btn-sm" onclick="openAddUser()">+ Add user</button>
    </div>
    <div class="search-bar">
      <span style="color:var(--hint)">🔍</span>
      <input type="text" id="user-search" placeholder="Search email or name…" oninput="renderUsers()">
    </div>
    <div class="gcard" id="users-list"></div>
  </div>
</div>

<!-- TAB: RISK -->
<div id="tab-risk" class="hidden">
  <div class="section" style="margin-top:16px">
    <div class="section-title" style="margin-bottom:12px">All risk items</div>
    <div id="risk-full"></div>
  </div>
</div>

<!-- BOTTOM TAB BAR -->
<div class="tab-bar">
  <button class="tab-item active" id="tbar-overview" onclick="showTab('overview')"><span class="tab-icon">📊</span><span class="tab-label">Overview</span></button>
  <button class="tab-item" id="tbar-stores" onclick="showTab('stores')"><span class="tab-icon">🏪</span><span class="tab-label">Stores</span></button>
  <button class="tab-item" id="tbar-employees" onclick="showTab('employees')"><span class="tab-icon">👥</span><span class="tab-label">People</span></button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://hnvytilmxoiaqceseooh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhudnl0aWxteG9pYXFjZXNlb29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTc0ODIsImV4cCI6MjA4OTQ5MzQ4Mn0.x7WCLXRZEoorxEIuk5dwHG8EpasBGGB7peBysWUdElw';
// ────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const APP_COLORS={POS:'#0A84FF',GR:'#30D158',ST:'#FF9F0A',FP:'#FF6B35',default:'#8E8E93'};
const ROLE_LABELS={ho_admin:'HO Admin',hr_admin:'HR Admin',bu_hr_admin:'HR Admin (BU)',bu_manager:'BU Manager',store_manager:'Store Manager'};
const ROLE_CLS={ho_admin:'role-ho',hr_admin:'role-hr',bu_hr_admin:'role-hr',bu_manager:'role-bu',store_manager:'role-store'};

let SESSION=null, USER_ROLE=null, BU_ID=null, CURRENT_ROLE=null;
let ALL_BUS=[], STORES=[], APPS=[], EMPLOYEES=[], ASSIGNMENTS=[], USERS=[], USER_ROLES_ALL=[];
let CUR_APP_FILTER=null, CUR_EMP_FILTER='all';
let realtimeChannel=null;

// ── INIT ─────────────────────────────────────────────────────────
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  SESSION=session;

  // Get BU context from sessionStorage (set by login BU picker)
  BU_ID=sessionStorage.getItem('gid_bu_id');
  CURRENT_ROLE=sessionStorage.getItem('gid_role');

  if(!BU_ID){
    // Fallback: get first role from DB
    const {data:roles}=await sb.from('user_roles').select('*').eq('user_id',session.user.id).limit(1);
    if(!roles||!roles.length){window.location.href='index.html';return;}
    BU_ID=roles[0].bu_id; CURRENT_ROLE=roles[0].role;
    sessionStorage.setItem('gid_bu_id',BU_ID);
    sessionStorage.setItem('gid_role',CURRENT_ROLE);
  }

  document.getElementById('nav-sub').textContent=`${CURRENT_ROLE?.replace(/_/g,' ')} · ${session.user.email}`;

  // Load all BUs for switcher
  const {data:allRoles}=await sb.from('user_roles').select('bu_id,role,business_units(id,name,code)').eq('user_id',session.user.id);
  ALL_BUS=(allRoles||[]).map(r=>({...r.business_units,role:r.role})).filter(b=>b.id);

  if(ALL_BUS.length>1){
    const sw=document.getElementById('bu-switcher');sw.classList.remove('hidden');
    document.getElementById('bu-select').innerHTML=ALL_BUS.map(b=>`<option value="${b.id}"${b.id===BU_ID?' selected':''}>${b.name} (${ROLE_LABELS[b.role]||b.role})</option>`).join('');
  }

  // Show Users tab for admin roles
  const isAdmin=['ho_admin','hr_admin','bu_hr_admin'].includes(CURRENT_ROLE);
  if(isAdmin){
    document.getElementById('tab-users-chip').style.display='';
    document.getElementById('tbar-users').style.display='';
  }

  await loadAll();
  setupRealtime();
}

async function onBuSwitch(){
  BU_ID=document.getElementById('bu-select').value;
  const bu=ALL_BUS.find(b=>b.id===BU_ID);
  CURRENT_ROLE=bu?.role||CURRENT_ROLE;
  sessionStorage.setItem('gid_bu_id',BU_ID);
  sessionStorage.setItem('gid_role',CURRENT_ROLE);
  await loadAll();
  setupRealtime();
}

async function loadAll(){
  setSyncState('syncing');
  const bu=ALL_BUS.find(b=>b.id===BU_ID);
  document.getElementById('nav-title').textContent=bu?.name||sessionStorage.getItem('gid_bu_name')||'BU Dashboard';

  // Get store IDs for this BU first
  const {data:stData}=await sb.from('stores').select('*').eq('bu_id',BU_ID).eq('active',true).order('code');
  STORES=stData||[];
  const storeIds=STORES.map(s=>s.id);

  const [appRes,empRes,asnRes]=await Promise.all([
    sb.from('apps').select('*').eq('bu_id',BU_ID).eq('active',true).order('code'),
    sb.from('employees').select('*').eq('bu_id',BU_ID).order('full_name'),
    storeIds.length
      ? sb.from('generic_id_assignments').select('*,app:app_id(code,name,pw_rotation_days),employee:employee_id(emp_code,full_name,status),supervisor:supervisor_id(emp_code,full_name,status)').in('store_id',storeIds)
      : {data:[]}
  ]);
  APPS=appRes.data||[];
  EMPLOYEES=empRes.data||[];
  ASSIGNMENTS=asnRes.data||[];

  // Load users if admin
  if(['ho_admin','hr_admin','bu_hr_admin'].includes(CURRENT_ROLE)){
    await loadUsers();
  }

  // Populate store select in employee form
  document.getElementById('u-store').innerHTML=STORES.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');

  renderAll();
  setSyncState('ok');
}

async function loadUsers(){
  // Load user_profiles + their roles for this BU
  const {data:profiles}=await sb.from('user_profiles').select('*').order('email');
  USERS=profiles||[];
  const {data:uroles}=await sb.from('user_roles').select('*,business_units(name,code)');
  USER_ROLES_ALL=uroles||[];
}

function renderAll(){
  renderMetrics(); renderAppFilterChips(); renderStoreRows();
  renderEmployees(); renderApps(); renderRiskAlerts(); renderRiskFull();
  if(['ho_admin','hr_admin','bu_hr_admin'].includes(CURRENT_ROLE)) renderUsers();
}

// ── REALTIME ──────────────────────────────────────────────────────
function setupRealtime(){
  if(realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel=sb.channel('bu_'+BU_ID)
    .on('postgres_changes',{event:'*',schema:'public',table:'generic_id_assignments'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'employees'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'stores'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'user_profiles'},()=>loadUsers().then(renderUsers))
    .subscribe(s=>{
      if(s==='SUBSCRIBED') setSyncState('ok');
      else if(s==='CHANNEL_ERROR') setSyncState('error');
    });
}

function setSyncState(s){
  const p=document.getElementById('sync-pill'),l=document.getElementById('sync-label');
  p.className='sync-pill'+(s==='syncing'?' syncing':s==='error'?' error':'');
  l.textContent=s==='ok'?'Live':s==='syncing'?'Syncing…':'Offline';
}

// ── METRICS ───────────────────────────────────────────────────────
function renderMetrics(){
  const asn=CUR_APP_FILTER?ASSIGNMENTS.filter(a=>a.app?.code===CUR_APP_FILTER):ASSIGNMENTS;
  const pwDue=asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length;
  const risk=asn.filter(a=>['at_risk','orphan'].includes(a.status)).length;
  const metrics=[
    {l:'Stores',v:STORES.length,c:'blue'},
    {l:'Employees',v:EMPLOYEES.filter(e=>e.status==='active').length,c:'green'},
    {l:'Total IDs',v:asn.length,c:''},
    {l:'Active IDs',v:asn.filter(a=>a.status==='active').length,c:'green'},
    {l:'Pw overdue',v:pwDue,c:pwDue?'amber':'green'},
    {l:'Risk alerts',v:risk,c:risk?'red':'green'},
  ];
  document.getElementById('metrics-row').innerHTML=metrics.map(m=>`
    <div class="mcard"><div class="mcard-label">${m.l}</div><div class="mcard-value ${m.c}">${m.v}</div></div>`).join('');
}

// ── APP FILTER CHIPS ──────────────────────────────────────────────
function renderAppFilterChips(){
  const counts={};ASSIGNMENTS.forEach(a=>{const c=a.app?.code||'?';counts[c]=(counts[c]||0)+1;});
  document.getElementById('app-filter-chips').innerHTML=
    `<button class="tab-chip${!CUR_APP_FILTER?' active':''}" onclick="setAppFilter(null)">All apps <span style="opacity:.6;font-size:11px">${ASSIGNMENTS.length}</span></button>`+
    APPS.map(a=>`<button class="tab-chip${CUR_APP_FILTER===a.code?' active':''}" onclick="setAppFilter('${a.code}')">
      <span class="tab-chip-dot" style="background:${APP_COLORS[a.code]||APP_COLORS.default}"></span>
      ${a.name} <span style="opacity:.6;font-size:11px">${counts[a.code]||0}</span>
    </button>`).join('');
}

function setAppFilter(code){
  CUR_APP_FILTER=code;renderMetrics();renderAppFilterChips();renderStoreRows();renderRiskAlerts();renderRiskFull();
}

// ── STORES ────────────────────────────────────────────────────────
function renderStoreRows(){
  const summaryEl=document.getElementById('store-summary');
  const listEl=document.getElementById('stores-list');
  if(!STORES.length){
    const empty='<div class="empty"><div class="empty-icon">🏪</div>No stores yet</div>';
    summaryEl.innerHTML=empty;listEl.innerHTML=empty;return;
  }
  const html=STORES.map(s=>storeRowHtml(s)).join('');
  summaryEl.innerHTML=STORES.slice(0,4).map(s=>storeRowHtml(s)).join('');
  listEl.innerHTML=html;
}

function storeRowHtml(s){
  const asn=ASSIGNMENTS.filter(a=>a.store_id===s.id&&(!CUR_APP_FILTER||a.app?.code===CUR_APP_FILTER));
  const active=asn.filter(a=>a.status==='active').length;
  const risk=asn.filter(a=>['at_risk','orphan'].includes(a.status)).length;
  const pwDue=asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length;
  const color=`hsl(${(s.code.charCodeAt(0)*47+s.code.charCodeAt(1||0)*23)%360},50%,42%)`;
  return `<div class="store-row" onclick="openStoreDetail('${s.id}')">
    <div class="store-icon" style="background:${color}">${s.code.slice(0,2)}</div>
    <div class="store-info">
      <div class="store-name">${s.name}</div>
      <div class="store-meta">${s.region||'—'} · ${asn.length} IDs · ${active} active</div>
      <div class="risk-pills">
        ${pwDue?`<span class="badge b-warn">${pwDue} pw due</span>`:''}
        ${risk?`<span class="badge b-danger">${risk} risk</span>`:''}
        ${!pwDue&&!risk?`<span class="badge b-ok">All clear</span>`:''}
      </div>
    </div>
    <span style="color:var(--hint);font-size:20px">›</span>
  </div>`;
}

// ── EMPLOYEES ─────────────────────────────────────────────────────
function setEmpFilter(f){
  CUR_EMP_FILTER=f;
  document.querySelectorAll('#emp-filter-chips .tab-chip').forEach((c,i)=>{
    c.classList.toggle('active',['all','active','resigned','suspended'][i]===f);
  });
  renderEmployees();
}

function renderEmployees(){
  const q=(document.getElementById('emp-search').value||'').toLowerCase();
  let emps=EMPLOYEES;
  if(CUR_EMP_FILTER!=='all') emps=emps.filter(e=>e.status===CUR_EMP_FILTER);
  if(q) emps=emps.filter(e=>e.full_name.toLowerCase().includes(q)||e.emp_code.toLowerCase().includes(q)||(e.mobile||'').includes(q));
  const storeMap={};STORES.forEach(s=>storeMap[s.id]=s.name);
  const el=document.getElementById('employees-list');
  if(!emps.length){el.innerHTML='<div class="empty"><div class="empty-icon">👤</div>No employees found</div>';return;}
  const cls={active:'b-active',resigned:'b-disabled',suspended:'b-warn',transferred:'b-neutral'};
  el.innerHTML=emps.map(e=>{
    const init=e.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div class="list-row" onclick="openEmpDetail('${e.id}')">
      <div class="list-avatar" style="${e.status==='resigned'?'background:var(--red-lt);color:var(--red-dk)':''}">${init}</div>
      <div class="list-info">
        <div class="list-name">${e.full_name}</div>
        <div class="list-sub">${e.emp_code} · ${storeMap[e.store_id]||'—'} · ${e.mobile||'no mobile'}</div>
      </div>
      <span class="badge ${cls[e.status]||'b-neutral'}">${e.status}</span>
    </div>`;
  }).join('');
}

// ── APPS ──────────────────────────────────────────────────────────
function renderApps(){
  const el=document.getElementById('apps-list');
  if(!APPS.length){el.innerHTML='<div class="empty"><div class="empty-icon">📱</div>No apps yet</div>';return;}
  el.innerHTML=APPS.map(a=>{
    const count=ASSIGNMENTS.filter(x=>x.app?.code===a.code).length;
    const active=ASSIGNMENTS.filter(x=>x.app?.code===a.code&&x.status==='active').length;
    const color=APP_COLORS[a.code]||APP_COLORS.default;
    return `<div class="gcard" style="margin-bottom:12px">
      <div class="gcard-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:40px;height:40px;border-radius:11px;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${color}">${a.id_prefix}</div>
          <div><div style="font-size:15px;font-weight:700">${a.name}</div>
          <div style="font-size:12px;color:var(--muted)">Rotate every ${a.pw_rotation_days}d</div></div>
        </div>
        <div style="display:flex;gap:6px"><span class="badge b-info">${count} IDs</span><span class="badge b-ok">${active} active</span></div>
      </div>
      <div style="padding:12px 16px;display:flex;gap:7px;flex-wrap:wrap">
        ${STORES.map(s=>{const c=ASSIGNMENTS.filter(x=>x.app?.code===a.code&&x.store_id===s.id).length;return `<span class="badge b-neutral">${s.code}: ${c}</span>`;}).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── USERS ─────────────────────────────────────────────────────────
function renderUsers(){
  const q=(document.getElementById('user-search')?.value||'').toLowerCase();
  const el=document.getElementById('users-list');
  if(!USERS.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔐</div>No users yet</div>';return;}
  const filtered=q?USERS.filter(u=>u.email.toLowerCase().includes(q)||(u.full_name||'').toLowerCase().includes(q)):USERS;
  el.innerHTML=filtered.map(u=>{
    const uroles=USER_ROLES_ALL.filter(r=>r.user_id===u.id);
    const init=(u.email||'?').slice(0,2).toUpperCase();
    return `<div class="list-row" onclick="openUserDetail('${u.id}')">
      <div class="list-avatar" style="background:var(--purple-lt);color:var(--purple-dk)">${init}</div>
      <div class="list-info">
        <div class="list-name">${u.email}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">
          ${uroles.map(r=>`<span class="role-tag ${ROLE_CLS[r.role]||'role-store'}">${ROLE_LABELS[r.role]||r.role} · ${r.business_units?.name||'?'}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── RISK ──────────────────────────────────────────────────────────
function getRiskItems(){
  const asn=CUR_APP_FILTER?ASSIGNMENTS.filter(a=>a.app?.code===CUR_APP_FILTER):ASSIGNMENTS;
  const items=[];
  const atRisk=asn.filter(a=>a.status==='at_risk');
  const orphans=asn.filter(a=>a.status==='orphan');
  const pwOver=asn.filter(a=>a.status==='active'&&isPwOverdue(a));
  if(atRisk.length) items.push({type:'danger',icon:'⚠️',title:`${atRisk.length} ID(s) at risk`,desc:'Supervisor resigned. Reassign or disable.',ids:atRisk.map(a=>a.generic_id).join(', ')});
  if(orphans.length) items.push({type:'danger',icon:'⛔',title:`${orphans.length} orphan session(s)`,desc:'Login detected with no active assignment. Investigate immediately.',ids:orphans.map(a=>a.generic_id).join(', ')});
  if(pwOver.length) items.push({type:'warn',icon:'🔑',title:`${pwOver.length} password(s) overdue`,desc:'Rotation required — IDs still active but non-compliant.',ids:pwOver.map(a=>a.generic_id).join(', ')});
  return items;
}

function riskHtml(items,withBtn){
  return items.length
    ?items.map(i=>`<div class="risk-card ${i.type}">
      <div class="risk-icon">${i.icon}</div>
      <div><div class="risk-title">${i.title}</div><div class="risk-desc">${i.desc}</div>
      ${i.ids?`<div style="font-size:12px;margin-top:6px;opacity:.8">IDs: <strong>${i.ids}</strong></div>`:''}
      ${withBtn?`<button class="btn btn-glass btn-xs" style="margin-top:10px" onclick="showTab('stores')">Go to stores</button>`:''}
      </div></div>`).join('')
    :'<div class="empty"><div class="empty-icon">✅</div>No open risks</div>';
}

function renderRiskAlerts(){document.getElementById('risk-alerts').innerHTML=riskHtml(getRiskItems(),false)}
function renderRiskFull(){document.getElementById('risk-full').innerHTML=riskHtml(getRiskItems(),true)}
function isPwOverdue(a){if(!a.pw_last_rotated)return false;return Math.floor((Date.now()-new Date(a.pw_last_rotated))/(864e5))>=(a.app?.pw_rotation_days||30)}

// ── STORE DETAIL ──────────────────────────────────────────────────
function openStoreDetail(storeId){
  const s=STORES.find(x=>x.id===storeId);if(!s)return;
  document.getElementById('sd-title').textContent=s.name;
  const asn=ASSIGNMENTS.filter(a=>a.store_id===s.id);
  const emps=EMPLOYEES.filter(e=>e.store_id===s.id);
  document.getElementById('sd-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div class="mcard"><div class="mcard-label">Total IDs</div><div class="mcard-value blue">${asn.length}</div></div>
      <div class="mcard"><div class="mcard-label">Active</div><div class="mcard-value green">${asn.filter(a=>a.status==='active').length}</div></div>
      <div class="mcard"><div class="mcard-label">Employees</div><div class="mcard-value">${emps.filter(e=>e.status==='active').length}</div></div>
      <div class="mcard"><div class="mcard-label">Pw overdue</div><div class="mcard-value amber">${asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length}</div></div>
    </div>
    <div class="section-title" style="margin-bottom:8px">By app</div>
    ${APPS.map(a=>{
      const c=asn.filter(x=>x.app?.code===a.code);const col=APP_COLORS[a.code]||APP_COLORS.default;
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border2)">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>
          <span style="font-size:14px;font-weight:500">${a.name}</span>
        </div>
        <div style="display:flex;gap:6px"><span class="badge b-info">${c.length} IDs</span><span class="badge b-ok">${c.filter(x=>x.status==='active').length} active</span></div>
      </div>`;
    }).join('')}
    <div style="margin-top:14px;font-size:13px;color:var(--muted)">Region: ${s.region||'—'} · Code: ${s.code}</div>`;
  openSheet('sheet-store-detail');
}

// ── EMPLOYEE DETAIL ───────────────────────────────────────────────
function openEmpDetail(empId){
  const e=EMPLOYEES.find(x=>x.id===empId);if(!e)return;
  const init=e.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const storeName=STORES.find(s=>s.id===e.store_id)?.name||'—';
  const empAsn=ASSIGNMENTS.filter(a=>a.employee_id===e.id);
  const cls={active:'b-active',resigned:'b-disabled',suspended:'b-warn',transferred:'b-neutral'};
  document.getElementById('emp-sheet-title').textContent=e.full_name;
  document.getElementById('emp-sheet-body').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px;background:var(--surface2);border-radius:var(--radius-lg)">
      ${e.photo_url?`<img src="${e.photo_url}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;flex-shrink:0">`
        :`<div style="width:64px;height:64px;border-radius:50%;background:var(--blue-lt);color:var(--blue-dk);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0">${init}</div>`}
      <div><div style="font-size:18px;font-weight:700">${e.full_name}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">${e.emp_code}</div>
        <div style="margin-top:6px"><span class="badge ${cls[e.status]||'b-neutral'}">${e.status}</span></div>
      </div>
    </div>
    <table style="width:100%;font-size:14px;border-collapse:collapse">
      <tr><td style="color:var(--muted);padding:8px 0;width:110px">Store</td><td>${storeName}</td></tr>
      <tr><td style="color:var(--muted);padding:8px 0;border-top:0.5px solid var(--border2)">Mobile</td><td>${e.mobile||'—'}</td></tr>
      <tr><td style="color:var(--muted);padding:8px 0;border-top:0.5px solid var(--border2)">Supervisor</td><td>${e.supervisor_emp_code||'—'}</td></tr>
      ${e.resigned_at?`<tr><td style="color:var(--muted);padding:8px 0;border-top:0.5px solid var(--border2)">Resigned</td><td style="color:var(--red-dk)">${new Date(e.resigned_at).toLocaleDateString()}</td></tr>`:''}
    </table>
    ${empAsn.length?`<div style="margin-top:16px"><div class="section-title" style="margin-bottom:8px">Generic IDs</div>
      ${empAsn.map(a=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border2)">
        <span style="font-family:monospace;font-size:13px;font-weight:600">${a.generic_id}</span>
        <span style="font-size:12px;color:var(--muted)">${a.app?.name||'—'}</span>
        <span class="badge ${a.status==='active'?'b-active':'b-idle'}">${a.status}</span>
      </div>`).join('')}</div>`:''}`;
  document.getElementById('emp-sheet-footer').innerHTML=`
    <button class="btn btn-glass btn-full" onclick="closeSheet('sheet-employee')">Close</button>
    ${e.status==='active'?`<button class="btn btn-red btn-full btn-sm" onclick="markResigned('${e.id}')">Mark resigned</button>`:''}`;
  openSheet('sheet-employee');
}

async function markResigned(empId){
  if(!confirm('Mark this employee as resigned? Their generic IDs will be auto-disabled.'))return;
  const now=new Date().toISOString();
  await sb.from('employees').update({status:'resigned',resigned_at:now,updated_at:now}).eq('id',empId);
  const {data:held}=await sb.from('generic_id_assignments').select('id,generic_id,store_id,app_id').eq('employee_id',empId).neq('status','disabled');
  if(held&&held.length){
    await sb.from('generic_id_assignments').update({status:'disabled',disabled_at:now,disabled_reason:'Marked resigned via BU dashboard'}).eq('employee_id',empId).neq('status','disabled');
    for(const a of held){await sb.from('audit_log').insert({store_id:a.store_id,app_id:a.app_id,generic_id:a.generic_id,employee_id:empId,event_type:'resign_auto_disable',event_by:SESSION.user.email,detail:{source:'bu_dashboard'}});}
  }
  closeSheet('sheet-employee');await loadAll();
}

// ── ADD EMPLOYEE ──────────────────────────────────────────────────
function openAddEmployee(){
  document.getElementById('emp-sheet-title').textContent='Add employee';
  document.getElementById('emp-sheet-body').innerHTML=`
    <div class="two-col">
      <div class="field"><label>Employee code</label><input id="e-code" placeholder="EMP-5001"></div>
      <div class="field"><label>Mobile</label><input id="e-mobile" placeholder="+66 81…" type="tel"></div>
    </div>
    <div class="field"><label>Full name</label><input id="e-name" placeholder="First Last"></div>
    <div class="two-col">
      <div class="field"><label>Store</label><select id="e-store">${STORES.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
      <div class="field"><label>Status</label><select id="e-status"><option value="active">Active</option><option value="resigned">Resigned</option><option value="suspended">Suspended</option><option value="transferred">Transferred</option></select></div>
    </div>
    <div class="field"><label>Supervisor EMP code</label><input id="e-sup" placeholder="EMP-4200"></div>
    <div id="e-err" class="hidden" style="color:var(--red-dk);font-size:13px;margin-top:-8px;margin-bottom:8px"></div>`;
  document.getElementById('emp-sheet-footer').innerHTML=`
    <button class="btn btn-glass btn-full" onclick="closeSheet('sheet-employee')">Cancel</button>
    <button class="btn btn-green btn-full" id="e-save-btn" onclick="saveEmployee()">Save employee</button>`;
  openSheet('sheet-employee');
}

async function saveEmployee(){
  const code=document.getElementById('e-code').value.trim().toUpperCase();
  const name=document.getElementById('e-name').value.trim();
  const mobile=document.getElementById('e-mobile').value.trim();
  const storeId=document.getElementById('e-store').value;
  const status=document.getElementById('e-status').value;
  const sup=document.getElementById('e-sup').value.trim().toUpperCase();
  const errEl=document.getElementById('e-err');
  if(!code||!name){errEl.textContent='Employee code and name required.';errEl.classList.remove('hidden');return;}
  const btn=document.getElementById('e-save-btn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const {error}=await sb.from('employees').insert({emp_code:code,bu_id:BU_ID,store_id:storeId||null,full_name:name,mobile:mobile||null,supervisor_emp_code:sup||null,status,source:'manual'});
  btn.disabled=false;btn.textContent='Save employee';
  if(error){errEl.textContent=error.message;errEl.classList.remove('hidden');return;}
  closeSheet('sheet-employee');await loadAll();
}

// ── ADD STORE ─────────────────────────────────────────────────────
async function saveStore(){
  const code=document.getElementById('s-code').value.trim().toUpperCase();
  const name=document.getElementById('s-name').value.trim();
  const region=document.getElementById('s-region').value.trim();
  const errEl=document.getElementById('s-err');
  if(!code||!name){errEl.textContent='Code and name required.';errEl.classList.remove('hidden');return;}
  const {error}=await sb.from('stores').insert({bu_id:BU_ID,code,name,region:region||null});
  if(error){errEl.textContent=error.message;errEl.classList.remove('hidden');return;}
  closeSheet('sheet-store');await loadAll();
}

// ── ADD APP ───────────────────────────────────────────────────────
async function saveApp(){
  const code=document.getElementById('a-code').value.trim().toUpperCase();
  const name=document.getElementById('a-name').value.trim();
  const prefix=document.getElementById('a-prefix').value.trim().toUpperCase();
  const days=parseInt(document.getElementById('a-days').value)||30;
  const errEl=document.getElementById('a-err');
  if(!code||!name||!prefix){errEl.textContent='All fields required.';errEl.classList.remove('hidden');return;}
  const {error}=await sb.from('apps').insert({bu_id:BU_ID,code,name,id_prefix:prefix,pw_rotation_days:days,active:true});
  if(error){errEl.textContent=error.message;errEl.classList.remove('hidden');return;}
  closeSheet('sheet-app');await loadAll();
}

// ── ADD USER ──────────────────────────────────────────────────────
function openAddUser(){
  document.getElementById('u-email').value='';
  document.getElementById('u-name').value='';
  document.getElementById('u-password').value='';
  document.getElementById('u-role').value='store_manager';
  document.getElementById('u-err').classList.add('hidden');
  // Populate BU list
  document.getElementById('u-bu-list').innerHTML=ALL_BUS.map(b=>`
    <div class="bu-check-item">
      <input type="checkbox" id="bu-cb-${b.id}" value="${b.id}" ${b.id===BU_ID?'checked':''}>
      <div class="bu-check-info">
        <div class="bu-check-name">${b.name}</div>
        <div class="bu-check-sub">${b.code}</div>
      </div>
    </div>`).join('');
  onRoleChange();
  openSheet('sheet-user');
}

function onRoleChange(){
  const role=document.getElementById('u-role').value;
  const storeField=document.getElementById('u-store-field');
  const buField=document.getElementById('u-bu-field');
  storeField.classList.toggle('hidden',role!=='store_manager');
  buField.classList.toggle('hidden',!['hr_admin','ho_admin'].includes(role));
}

async function saveUser(){
  const email=document.getElementById('u-email').value.trim();
  const name=document.getElementById('u-name').value.trim();
  const password=document.getElementById('u-password').value;
  const role=document.getElementById('u-role').value;
  const errEl=document.getElementById('u-err');

  if(!email||!password){errEl.textContent='Email and password required.';errEl.classList.remove('hidden');return;}
  if(password.length<8){errEl.textContent='Password must be at least 8 characters.';errEl.classList.remove('hidden');return;}

  const btn=document.getElementById('user-save-btn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Creating…';

  // Create user via Supabase Admin API (using service role via Edge Function is ideal;
  // for POC we use signUp which sends a confirmation email)
  const {data:authData,error:authErr}=await sb.auth.admin?.createUser
    ? await sb.auth.admin.createUser({email,password,email_confirm:true})
    : await sb.auth.signUp({email,password});

  btn.disabled=false;btn.innerHTML='Create user';

  if(authErr){errEl.textContent=authErr.message;errEl.classList.remove('hidden');return;}

  const userId=authData?.user?.id||authData?.id;
  if(!userId){errEl.textContent='User created but ID not returned. Check Auth > Users.';errEl.classList.remove('hidden');return;}

  // Save profile
  await sb.from('user_profiles').upsert({id:userId,email,full_name:name||null},{onConflict:'id'});

  // Assign roles
  const buIds=['hr_admin','ho_admin'].includes(role)
    ? [...document.querySelectorAll('#u-bu-list input:checked')].map(c=>c.value)
    : [BU_ID];

  const storeId=role==='store_manager'?document.getElementById('u-store').value:null;

  for(const bid of buIds){
    await sb.from('user_roles').upsert({user_id:userId,bu_id:bid,role,store_id:storeId||null},{onConflict:'user_id,bu_id'});
  }

  closeSheet('sheet-user');
  await loadUsers();
  renderUsers();
  showTab('users');
}

// ── USER DETAIL ───────────────────────────────────────────────────
function openUserDetail(userId){
  const u=USERS.find(x=>x.id===userId);if(!u)return;
  const uroles=USER_ROLES_ALL.filter(r=>r.user_id===userId);
  document.getElementById('user-sheet-title').textContent=u.email;
  document.getElementById('sheet-user').querySelector('.sheet-body').innerHTML=`
    <div style="padding:16px;background:var(--surface2);border-radius:var(--radius-lg);margin-bottom:20px">
      <div style="font-size:16px;font-weight:700">${u.full_name||u.email}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">${u.email}</div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        ${uroles.map(r=>`<span class="role-tag ${ROLE_CLS[r.role]||'role-store'}">${ROLE_LABELS[r.role]||r.role} · ${r.business_units?.name||'?'}</span>`).join('')}
      </div>
    </div>
    <div class="section-title" style="margin-bottom:8px">BU access</div>
    ${uroles.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border2)">
      <div>
        <div style="font-weight:500">${r.business_units?.name||'?'}</div>
        <div style="font-size:12px;color:var(--muted)">${ROLE_LABELS[r.role]||r.role}</div>
      </div>
      <button class="btn btn-red btn-xs" onclick="removeUserRole('${userId}','${r.bu_id}')">Remove</button>
    </div>`).join('')}
    <button class="btn btn-blue btn-sm" style="margin-top:14px;width:100%" onclick="addBuToUser('${userId}')">+ Add BU access</button>`;
  document.getElementById('sheet-user').querySelector('.sheet-footer').innerHTML=`
    <button class="btn btn-glass btn-full" onclick="closeSheet('sheet-user')">Close</button>`;
  openSheet('sheet-user');
}

async function removeUserRole(userId,buId){
  if(!confirm('Remove this user\'s access to this BU?'))return;
  await sb.from('user_roles').delete().eq('user_id',userId).eq('bu_id',buId);
  await loadUsers();renderUsers();closeSheet('sheet-user');
}

async function addBuToUser(userId){
  const buId=prompt('Enter BU ID to grant access (check Supabase > business_units table):');
  if(!buId)return;
  const role=prompt('Enter role: store_manager / bu_manager / bu_hr_admin / hr_admin / ho_admin');
  if(!role)return;
  await sb.from('user_roles').upsert({user_id:userId,bu_id:buId,role},{onConflict:'user_id,bu_id'});
  await loadUsers();renderUsers();closeSheet('sheet-user');
}

// ── HELPERS ───────────────────────────────────────────────────────
function openSheet(id){document.getElementById(id).classList.remove('hidden')}
function closeSheet(id){document.getElementById(id).classList.add('hidden')}
function switchBU(){sessionStorage.removeItem('gid_bu_id');window.location.href='index.html'}
async function doSignOut(){await sb.auth.signOut();sessionStorage.clear();window.location.href='index.html'}

function showTab(t){
  const tabs=['overview','stores','employees','apps','users','risk'];
  tabs.forEach(x=>{
    document.getElementById('tab-'+x)?.classList.toggle('hidden',x!==t);
    document.getElementById('tbar-'+x)?.classList.toggle('active',x===t);
  });
  document.querySelectorAll('#main-tabs .tab-chip').forEach(c=>{
    c.classList.toggle('active',c.textContent.trim().toLowerCase().startsWith(t==='employees'?'people':t));
  });
}

document.querySelectorAll('.sheet-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.add('hidden')}));
init();
</script>
