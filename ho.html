<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>HO Dashboard — Generic ID Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#F5F5F0;--white:#FFFFFF;--text:#1A1A1A;--muted:#6B6B6B;--hint:#9B9B9B;
  --border:#E8E8E3;--border2:#F0F0EB;
  --blue:#2563EB;--blue-lt:#EFF6FF;
  --green:#16A34A;--green-lt:#F0FDF4;
  --red:#DC2626;--red-lt:#FEF2F2;
  --amber:#D97706;--amber-lt:#FFFBEB;
  --purple:#7C3AED;--purple-lt:#F5F3FF;
  --radius:8px;--radius-lg:12px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:14px;min-height:100vh}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.brand-name{font-size:15px;font-weight:700}
.brand-sub{font-size:12px;color:var(--muted)}
.header-actions{display:flex;gap:8px;align-items:center}
.sync-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:var(--green-lt);border:1px solid #BBF7D0;font-size:12px;font-weight:500;color:var(--green)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-outline{background:var(--white);color:var(--text);border:1px solid var(--border)}

/* METRICS */
.metrics{display:flex;gap:12px;padding:20px 24px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto}
.metric{flex:1;min-width:110px}
.metric-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.metric-value{font-size:28px;font-weight:700;line-height:1}
.metric-value.blue{color:var(--blue)}
.metric-value.green{color:var(--green)}
.metric-value.red{color:var(--red)}
.metric-value.amber{color:var(--amber)}
.metric-divider{width:1px;background:var(--border);flex-shrink:0}

/* VIEW TABS */
.view-tabs{display:flex;gap:4px;padding:16px 24px;background:var(--white);border-bottom:1px solid var(--border)}
.view-tab{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .15s}
.view-tab:hover{color:var(--text);border-color:var(--text)}
.view-tab.active{background:var(--text);color:#fff;border-color:var(--text)}

/* FILTERS */
.filters{display:flex;gap:8px;padding:16px 24px;align-items:center;flex-wrap:wrap}
.filter-select{padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);font-size:13px;font-family:inherit;color:var(--text);cursor:pointer;outline:none}
.filter-select:focus{border-color:var(--blue)}
.spacer{flex:1}
.export-btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--muted);display:flex;align-items:center;gap:4px}
.export-btn:hover{color:var(--text)}

/* TABLE */
.content{padding:16px 24px}
.table-wrap{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:14px 16px;border-bottom:1px solid var(--border2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable:hover td{background:#FAFAFA;cursor:pointer}

/* RISK BAR */
.risk-bar-wrap{display:flex;align-items:center;gap:8px}
.risk-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;width:80px}
.risk-fill{height:100%;border-radius:3px}
.risk-score{font-size:12px;font-weight:600;width:24px;text-align:right}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
.badge-green{background:var(--green-lt);color:var(--green)}
.badge-red{background:var(--red-lt);color:var(--red)}
.badge-amber{background:var(--amber-lt);color:var(--amber)}
.badge-gray{background:#F3F4F6;color:var(--muted)}

/* BU CARD in table */
.bu-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}

/* DETAIL DRAWER */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:400;display:flex;justify-content:flex-end}
.drawer{width:100%;max-width:480px;background:var(--white);height:100%;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.drawer-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:10}
.drawer-title{font-size:16px;font-weight:700}
.drawer-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.drawer-body{padding:20px 24px}
.drawer-metric{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border2)}
.drawer-metric:last-child{border-bottom:none}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--hint)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.6}

.hidden{display:none!important}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    <div class="brand-icon">GID</div>
    <div>
      <div class="brand-name">Head Office · Access risk overview</div>
      <div class="brand-sub" id="header-sub">Generic ID program · loading…</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="sync-badge"><span class="sync-dot"></span><span id="sync-label">Live</span></div>
    <button class="btn btn-outline" onclick="gotoBU()">BU view</button>
    <button class="btn btn-outline" onclick="gotoStore()">Store portal</button>
    <button class="btn btn-outline" onclick="doSignOut()">Sign out</button>
  </div>
</div>

<!-- METRICS -->
<div class="metrics" id="ho-metrics"></div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <button class="view-tab active" onclick="setView('store')" id="tab-store">By store</button>
  <button class="view-tab" onclick="setView('app')" id="tab-app">By application</button>
  <button class="view-tab" onclick="setView('risk')" id="tab-risk">Risk area</button>
</div>

<!-- FILTERS -->
<div class="filters">
  <select class="filter-select" id="filter-region" onchange="renderView()">
    <option value="">All regions</option>
  </select>
  <select class="filter-select" id="filter-app" onchange="renderView()">
    <option value="">All systems</option>
  </select>
  <div class="spacer"></div>
  <button class="export-btn" onclick="exportCSV()">Export ↗</button>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="table-wrap" id="main-table"></div>
</div>

<!-- DETAIL DRAWER -->
<div class="drawer-bg hidden" id="drawer-bg" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <span class="drawer-title" id="drawer-title">Detail</span>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://hnvytilmxoiaqceseooh.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhudnl0aWxteG9pYXFjZXNlb29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTc0ODIsImV4cCI6MjA4OTQ5MzQ4Mn0.x7WCLXRZEoorxEIuk5dwHG8EpasBGGB7peBysWUdElw';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const APP_COLORS={POS:'#2563EB',GR:'#16A34A',ST:'#D97706',FP:'#DC2626',SC:'#7C3AED',default:'#6B7280'};
const BU_COLORS=['#2563EB','#16A34A','#D97706','#7C3AED','#DC2626','#0891B2'];

let SESSION=null,CUR_VIEW='store';
let BUS=[],STORES=[],APPS=[],ASSIGNMENTS=[];

async function init(){
  let {data:{session}}=await sb.auth.getSession();
  if(!session){const {data:r}=await sb.auth.refreshSession();session=r?.session;}
  if(!session){location.href='index.html';return;}
  SESSION=session;
  await loadAll();
}

async function loadAll(){
  setSyncState('syncing');
  const [busRes,storesRes,appsRes]=await Promise.all([
    sb.from('business_units').select('*').order('name'),
    sb.from('stores').select('*').eq('active',true).order('code'),
    sb.from('apps').select('*').eq('active',true).order('code')
  ]);
  BUS=busRes.data||[];STORES=storesRes.data||[];APPS=appsRes.data||[];

  const storeIds=STORES.map(s=>s.id);
  if(storeIds.length){
    const {data:asn}=await sb.from('generic_id_assignments')
      .select('id,store_id,app_id,generic_id,status,pw_last_rotated,emp_code,app:app_id(code,name,pw_rotation_days)')
      .in('store_id',storeIds);
    ASSIGNMENTS=asn||[];
  }

  // Populate filters
  const regions=[...new Set(STORES.map(s=>s.region).filter(Boolean))];
  document.getElementById('filter-region').innerHTML=`<option value="">All regions</option>`+regions.map(r=>`<option value="${r}">${r}</option>`).join('');
  const appCodes=[...new Set(APPS.map(a=>a.code))];
  document.getElementById('filter-app').innerHTML=`<option value="">All systems</option>`+appCodes.map(c=>`<option value="${c}">${APPS.find(a=>a.code===c)?.name||c}</option>`).join('');

  // Header sub
  document.getElementById('header-sub').textContent=`Generic ID program · ${STORES.length} stores · ${[...new Set(APPS.map(a=>a.code))].length} systems`;

  renderMetrics();renderView();setSyncState('ok');
}

function setSyncState(s){
  document.getElementById('sync-label').textContent=s==='syncing'?'Syncing…':'Live';
}

function renderMetrics(){
  const asn=filteredAsn();
  const active=asn.filter(a=>a.status==='active').length;
  const unassigned=asn.filter(a=>!a.emp_code||a.status==='idle').length;
  const pwDue=asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length;
  const orphans=asn.filter(a=>a.status==='orphan').length;
  const pending=asn.filter(a=>a.status==='at_risk').length;
  document.getElementById('ho-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total Generic IDs</div><div class="metric-value blue">${asn.length}</div></div>
    <div class="metric-divider"></div>
    <div class="metric"><div class="metric-label">Active</div><div class="metric-value green">${active}</div></div>
    <div class="metric-divider"></div>
    <div class="metric"><div class="metric-label">Unassigned</div><div class="metric-value">${unassigned}</div></div>
    <div class="metric-divider"></div>
    <div class="metric"><div class="metric-label">Pw overdue</div><div class="metric-value ${pwDue?'amber':''}">${pwDue}</div></div>
    <div class="metric-divider"></div>
    <div class="metric"><div class="metric-label">Orphan sessions</div><div class="metric-value ${orphans?'red':''}">${orphans}</div></div>
    <div class="metric-divider"></div>
    <div class="metric"><div class="metric-label">Pending resign</div><div class="metric-value ${pending?'amber':''}">${pending}</div></div>`;
}

function filteredAsn(){
  const region=document.getElementById('filter-region')?.value||'';
  const appCode=document.getElementById('filter-app')?.value||'';
  const storeIds=STORES.filter(s=>!region||s.region===region).map(s=>s.id);
  return ASSIGNMENTS.filter(a=>
    storeIds.includes(a.store_id)&&
    (!appCode||a.app?.code===appCode)
  );
}

function setView(v){
  CUR_VIEW=v;
  ['store','app','risk'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===v));
  renderView();renderMetrics();
}

function renderView(){
  if(CUR_VIEW==='store') renderByStore();
  else if(CUR_VIEW==='app') renderByApp();
  else renderRisk();
}

function renderByStore(){
  const region=document.getElementById('filter-region')?.value||'';
  const appCode=document.getElementById('filter-app')?.value||'';
  const stores=STORES.filter(s=>!region||s.region===region);

  const rows=stores.map(s=>{
    const bu=BUS.find(b=>b.id===s.bu_id);
    const asn=ASSIGNMENTS.filter(a=>a.store_id===s.id&&(!appCode||a.app?.code===appCode));
    const active=asn.filter(a=>a.status==='active').length;
    const pwDue=asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length;
    const orphans=asn.filter(a=>a.status==='orphan').length;
    const risk=asn.filter(a=>['at_risk','orphan'].includes(a.status)).length;
    const pwDuePct=active?pwDue/active:0;
    const riskScore=Math.min(100,Math.round(pwDue*3+orphans*15+risk*10));
    const riskColor=riskScore>=70?'#DC2626':riskScore>=30?'#D97706':'#16A34A';
    return {s,bu,asn,active,pwDue,orphans,riskScore,riskColor};
  }).sort((a,b)=>b.riskScore-a.riskScore);

  document.getElementById('main-table').innerHTML=`
    <table>
      <thead><tr>
        <th>Store</th><th>Region</th>
        <th>IDs total</th><th>Active</th>
        <th>Pw overdue</th><th>Orphan sessions</th>
        <th>Risk score</th><th></th>
      </tr></thead>
      <tbody>${rows.map(({s,bu,asn,active,pwDue,orphans,riskScore,riskColor})=>`
        <tr class="clickable" onclick="openStoreDrawer('${s.id}')">
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="font-weight:600">${s.name}</div>
            </div>
          </td>
          <td style="color:var(--muted)">${s.region||'—'}</td>
          <td style="font-weight:600">${asn.length}</td>
          <td style="color:var(--green);font-weight:600">${active}</td>
          <td>${pwDue>0?`<span class="badge badge-amber">${pwDue}</span>`:`<span style="color:var(--hint)">0</span>`}</td>
          <td>${orphans>0?`<span class="badge badge-red">${orphans}</span>`:`<span style="color:var(--hint)">0</span>`}</td>
          <td>
            <div class="risk-bar-wrap">
              <div class="risk-bar"><div class="risk-fill" style="width:${riskScore}%;background:${riskColor}"></div></div>
              <span class="risk-score" style="color:${riskColor}">${riskScore}</span>
            </div>
          </td>
          <td style="color:var(--hint)">→</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderByApp(){
  const region=document.getElementById('filter-region')?.value||'';
  const storeIds=STORES.filter(s=>!region||s.region===region).map(s=>s.id);
  const appCodes=[...new Set(APPS.map(a=>a.code))];

  document.getElementById('main-table').innerHTML=`
    <table>
      <thead><tr>
        <th>Application</th><th>BUs</th>
        <th>Total IDs</th><th>Active</th>
        <th>Pw overdue</th><th>Risk alerts</th>
        <th></th>
      </tr></thead>
      <tbody>${appCodes.map(code=>{
        const asn=ASSIGNMENTS.filter(a=>a.app?.code===code&&storeIds.includes(a.store_id));
        const active=asn.filter(a=>a.status==='active').length;
        const pwDue=asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length;
        const risk=asn.filter(a=>['at_risk','orphan'].includes(a.status)).length;
        const buCount=[...new Set(STORES.filter(s=>storeIds.includes(s.id)&&asn.some(a=>a.store_id===s.id)).map(s=>s.bu_id))].length;
        const color=APP_COLORS[code]||APP_COLORS.default;
        const appName=APPS.find(a=>a.code===code)?.name||code;
        return `<tr class="clickable" onclick="openAppDrawer('${code}')">
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
              <span style="font-weight:600">${appName}</span>
            </div>
          </td>
          <td style="color:var(--muted)">${buCount}</td>
          <td style="font-weight:600">${asn.length}</td>
          <td style="color:var(--green);font-weight:600">${active}</td>
          <td>${pwDue>0?`<span class="badge badge-amber">${pwDue}</span>`:`<span style="color:var(--hint)">0</span>`}</td>
          <td>${risk>0?`<span class="badge badge-red">${risk}</span>`:`<span style="color:var(--hint)">0</span>`}</td>
          <td style="color:var(--hint)">→</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

function renderRisk(){
  const all=filteredAsn();
  const items=[
    ...all.filter(a=>a.status==='orphan').map(a=>({type:'orphan',icon:'⛔',label:'Orphan session',a})),
    ...all.filter(a=>a.status==='at_risk').map(a=>({type:'atrisk',icon:'⚠️',label:'At risk — supervisor resigned',a})),
    ...all.filter(a=>a.status==='active'&&isPwOverdue(a)).map(a=>({type:'pwdue',icon:'🔑',label:'Password overdue',a})),
  ];

  if(!items.length){
    document.getElementById('main-table').innerHTML=`<div class="empty"><div class="empty-icon">✅</div>No open risks across all BUs</div>`;
    return;
  }

  document.getElementById('main-table').innerHTML=`
    <table>
      <thead><tr><th>Risk type</th><th>Generic ID</th><th>Store</th><th>App</th><th>Employee</th><th>Days</th></tr></thead>
      <tbody>${items.map(({type,icon,label,a})=>{
        const store=STORES.find(s=>s.id===a.store_id);
        const days=a.pw_last_rotated?Math.floor((Date.now()-new Date(a.pw_last_rotated))/(864e5)):null;
        const rowBg=type==='orphan'?'background:#FEF2F2':type==='atrisk'?'background:#FFFBEB':'';
        return `<tr style="${rowBg}">
          <td>${icon} <span style="font-size:12px;font-weight:600">${label}</span></td>
          <td><span style="font-family:monospace;font-weight:700">${a.generic_id}</span></td>
          <td style="font-size:12px;color:var(--muted)">${store?.name||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${a.app?.name||'—'}</td>
          <td style="font-family:monospace;font-size:12px">${a.emp_code||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${days!==null?days+'d':'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

// ── DRAWERS ─────────────────────────────────────────────────────
function openStoreDrawer(storeId){
  const s=STORES.find(x=>x.id===storeId);if(!s)return;
  const bu=BUS.find(b=>b.id===s.bu_id);
  const asn=ASSIGNMENTS.filter(a=>a.store_id===storeId);
  const active=asn.filter(a=>a.status==='active').length;
  const pwDue=asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length;
  const risk=asn.filter(a=>['at_risk','orphan'].includes(a.status)).length;
  const appCodes=[...new Set(APPS.filter(a=>a.bu_id===s.bu_id).map(a=>a.code))];

  document.getElementById('drawer-title').textContent=s.name;
  document.getElementById('drawer-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div style="padding:14px;background:var(--bg);border-radius:var(--radius)"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Total IDs</div><div style="font-size:26px;font-weight:700;color:var(--blue)">${asn.length}</div></div>
      <div style="padding:14px;background:var(--bg);border-radius:var(--radius)"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Active</div><div style="font-size:26px;font-weight:700;color:var(--green)">${active}</div></div>
      <div style="padding:14px;background:var(--bg);border-radius:var(--radius)"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Pw overdue</div><div style="font-size:26px;font-weight:700;color:${pwDue?'var(--amber)':'var(--text)'}">${pwDue}</div></div>
      <div style="padding:14px;background:var(--bg);border-radius:var(--radius)"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Risk alerts</div><div style="font-size:26px;font-weight:700;color:${risk?'var(--red)':'var(--text)'}">${risk}</div></div>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">By application</div>
    ${appCodes.map(code=>{
      const c=asn.filter(a=>a.app?.code===code);
      const col=APP_COLORS[code]||APP_COLORS.default;
      const appName=APPS.find(a=>a.code===code)?.name||code;
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2)">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>
          <span style="font-size:13px;font-weight:500">${appName}</span>
        </div>
        <div style="display:flex;gap:6px">
          <span class="badge badge-gray">${c.length} IDs</span>
          <span class="badge badge-green">${c.filter(x=>x.status==='active').length} active</span>
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:16px;font-size:12px;color:var(--muted)">Region: ${s.region||'—'} · BU: ${bu?.name||'—'} · Code: ${s.code}</div>
    <div style="margin-top:16px">
      <button class="btn btn-primary" style="width:100%" onclick="gotoStorePortal('${storeId}','${s.name}','${s.bu_id}')">Open store portal →</button>
    </div>`;
  document.getElementById('drawer-bg').classList.remove('hidden');
}

function openAppDrawer(code){
  const appName=APPS.find(a=>a.code===code)?.name||code;
  const asn=ASSIGNMENTS.filter(a=>a.app?.code===code);
  const active=asn.filter(a=>a.status==='active').length;
  const pwDue=asn.filter(a=>a.status==='active'&&isPwOverdue(a)).length;
  const color=APP_COLORS[code]||APP_COLORS.default;

  document.getElementById('drawer-title').textContent=appName;
  document.getElementById('drawer-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div style="padding:14px;background:var(--bg);border-radius:var(--radius)"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Total IDs</div><div style="font-size:26px;font-weight:700;color:${color}">${asn.length}</div></div>
      <div style="padding:14px;background:var(--bg);border-radius:var(--radius)"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Active</div><div style="font-size:26px;font-weight:700;color:var(--green)">${active}</div></div>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">By store</div>
    ${STORES.map(s=>{
      const c=asn.filter(a=>a.store_id===s.id);
      if(!c.length)return'';
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2)">
        <span style="font-size:13px;font-weight:500">${s.name}</span>
        <div style="display:flex;gap:6px">
          <span class="badge badge-gray">${c.length}</span>
          <span class="badge badge-green">${c.filter(x=>x.status==='active').length} active</span>
          ${c.filter(x=>isPwOverdue(x)).length?`<span class="badge badge-amber">${c.filter(x=>isPwOverdue(x)).length} pw</span>`:''}
        </div>
      </div>`;
    }).join('')}`;
  document.getElementById('drawer-bg').classList.remove('hidden');
}

function closeDrawer(){document.getElementById('drawer-bg').classList.add('hidden');}

// ── NAVIGATION ──────────────────────────────────────────────────
function gotoBU(){
  sessionStorage.setItem('gid_role','ho_admin');
  // Show BU picker if multiple BUs
  if(BUS.length>1){
    showBUPicker();return;
  }
  sessionStorage.setItem('gid_bu_id',BUS[0]?.id);
  location.href='bu.html';
}

function showBUPicker(){
  const colors=BU_COLORS;
  document.getElementById('drawer-title').textContent='Select BU';
  document.getElementById('drawer-body').innerHTML=BUS.map((b,i)=>`
    <div style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid var(--border2)" onclick="selectBU('${b.id}','${b.name}')" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
      <div style="width:40px;height:40px;border-radius:10px;background:${colors[i%colors.length]};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">${b.code.slice(0,2)}</div>
      <div><div style="font-size:15px;font-weight:600">${b.name}</div><div style="font-size:12px;color:var(--muted)">HO Admin</div></div>
      <span style="margin-left:auto;color:var(--hint)">›</span>
    </div>`).join('');
  document.getElementById('drawer-bg').classList.remove('hidden');
}

function selectBU(id,name){
  sessionStorage.setItem('gid_bu_id',id);
  sessionStorage.setItem('gid_bu_name',name);
  sessionStorage.setItem('gid_role','ho_admin');
  location.href='bu.html';
}

function gotoStore(){
  sessionStorage.removeItem('gid_store_id');
  location.href='store.html';
}

function gotoStorePortal(storeId,name,buId){
  sessionStorage.setItem('gid_store_id',storeId);
  sessionStorage.setItem('gid_store_name',name);
  sessionStorage.setItem('gid_bu_id',buId);
  location.href='store.html';
}

function exportCSV(){
  const rows=[['Store','Region','BU','Total IDs','Active','Pw Overdue','Risk']];
  STORES.forEach(s=>{
    const asn=ASSIGNMENTS.filter(a=>a.store_id===s.id);
    const bu=BUS.find(b=>b.id===s.bu_id);
    rows.push([s.name,s.region||'',bu?.name||'',asn.length,asn.filter(a=>a.status==='active').length,asn.filter(a=>isPwOverdue(a)).length,asn.filter(a=>['at_risk','orphan'].includes(a.status)).length]);
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download=`ho_report_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function isPwOverdue(a){if(!a.pw_last_rotated)return false;return Math.floor((Date.now()-new Date(a.pw_last_rotated))/(864e5))>=(a.app?.pw_rotation_days||30);}
async function doSignOut(){await sb.auth.signOut();sessionStorage.clear();location.href='index.html';}
init();
</script>
</body>
</html>
