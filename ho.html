

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Generic ID Manager">
<title>Generic ID Manager — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#185FA5;--blue-lt:#E6F1FB;--blue-dk:#0C447C;
  --green:#3B6D11;--green-lt:#EAF3DE;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --gray:#5F5E5A;--gray-lt:#F1EFE8;
  --text:#1C1C1E;--muted:#5F5E5A;--hint:#B4B2A9;
  --bg:#F5F4F0;--surface:#FFFFFF;
  --border:rgba(0,0,0,0.1);
  --radius:12px;--radius-lg:16px;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --text:#F2F2F7;--muted:#AEAEB2;--hint:#636366;
    --bg:#1C1C1E;--surface:#2C2C2E;--border:rgba(255,255,255,0.1);
    --blue-lt:rgba(24,95,165,0.2);--green-lt:rgba(59,109,17,0.2);--red-lt:rgba(163,45,45,0.2);
  }
}
body{
  min-height:100vh;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:var(--surface);border-radius:var(--radius-lg);
  box-shadow:var(--shadow);border:0.5px solid var(--border);
  padding:2rem;width:100%;max-width:400px;
}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-mark{
  width:60px;height:60px;border-radius:16px;
  background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;margin:0 auto 12px;
}
.logo h1{font-size:20px;font-weight:600;color:var(--text)}
.logo p{font-size:13px;color:var(--muted);margin-top:4px}
.field{margin-bottom:1rem}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
input{
  width:100%;padding:11px 14px;border-radius:var(--radius);
  border:0.5px solid var(--border);background:var(--bg);
  color:var(--text);font-size:15px;outline:none;transition:border .15s;
  font-family:inherit;
}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt)}
.btn{
  width:100%;padding:12px;border-radius:var(--radius);border:none;
  background:var(--blue);color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .15s;font-family:inherit;margin-top:.5rem;
}
.btn:hover{opacity:.9}
.btn:active{opacity:.75}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{
  background:var(--red-lt);color:var(--red);border:0.5px solid rgba(163,45,45,.3);
  border-radius:var(--radius);padding:10px 14px;font-size:13px;
  margin-bottom:1rem;display:none;
}
.spinner{
  display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{text-align:center;color:var(--hint);font-size:12px;margin:1.25rem 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:0.5px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
.role-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:1.25rem}
.badge{font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px;border:0.5px solid var(--border);color:var(--muted)}
.version{text-align:center;color:var(--hint);font-size:11px;margin-top:1.5rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">G</div>
    <h1>Generic ID Manager</h1>
    <p>Store access lifecycle management</p>
  </div>

  <div class="error" id="err"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Sign in</button>

  <div class="divider">roles</div>
  <div class="role-badges">
    <span class="badge">Store Manager</span>
    <span class="badge">BU Manager</span>
    <span class="badge">HO Admin</span>
  </div>
  <p class="version">v0.1 POC · Generic ID Manager</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://scakduifuyurgpgiqorh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjYWtkdWlmdXl1cmdwZ2lxb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTM4MjgsImV4cCI6MjA4OTQ4OTgyOH0.T5xDLMSXRvTuZNjq1DyHpC_l5HlPOBv8-ccUCG4nr2k';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// If already logged in, redirect
sb.auth.getSession().then(({data:{session}})=>{
  if(session) redirect(session.user.id);
});

function showErr(msg){
  const e=document.getElementById('err');
  e.textContent=msg;e.style.display='block';
}
function hideErr(){document.getElementById('err').style.display='none';}

async function doLogin(){
  hideErr();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!password){showErr('Please enter email and password.');return;}

  const btn=document.getElementById('loginBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Signing in…';

  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){
    showErr(error.message);
    btn.disabled=false;btn.innerHTML='Sign in';
    return;
  }
  redirect(data.user.id);
}

async function redirect(userId){
  // Get role for this user
  const {data:roles}=await sb.from('user_roles').select('role,store_id').eq('user_id',userId).limit(1);
  if(!roles||roles.length===0){
    // First time — go to setup or show message
    showErr('No role assigned yet. Ask your admin to assign your role in user_roles table.');
    await sb.auth.signOut();
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').innerHTML='Sign in';
    return;
  }
  const role=roles[0].role;
  if(role==='store_manager') window.location.href='store.html';
  else if(role==='bu_manager') window.location.href='bu.html';
  else if(role==='ho_admin') window.location.href='ho.html';
  else window.location.href='store.html';
}

// Enter key support
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
