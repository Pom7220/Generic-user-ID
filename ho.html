<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HO Dashboard — Generic ID Manager</title>
<style>
/* Shared styles for all three levels */
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#F5F5F0;--white:#FFFFFF;--text:#1A1A1A;--muted:#6B6B6B;--hint:#9B9B9B;
  --border:#E8E8E3;--border2:#F0F0EB;
  --blue:#2563EB;--blue-lt:#EFF6FF;--blue-dk:#1D4ED8;
  --green:#16A34A;--green-lt:#F0FDF4;
  --red:#DC2626;--red-lt:#FEF2F2;
  --amber:#D97706;--amber-lt:#FFFBEB;
  --purple:#7C3AED;--purple-lt:#F5F3FF;
  --radius:8px;--radius-lg:12px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:14px;min-height:100vh}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:none;white-space:nowrap}
.back-btn:hover{background:var(--bg);color:var(--text)}
.brand-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.header-title h1{font-size:17px;font-weight:700;color:var(--text)}
.header-title p{font-size:12px;color:var(--muted);margin-top:1px}
.header-actions{display:flex;gap:8px;align-items:center}
.sync-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:var(--green-lt);border:1px solid #BBF7D0;font-size:12px;font-weight:500;color:var(--green)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-outline{background:var(--white);color:var(--text);border:1px solid var(--border)}
.metrics{display:flex;gap:0;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto}
.metric{flex:1;min-width:110px;padding:16px 20px;cursor:pointer;transition:background .15s;border-right:1px solid var(--border);position:relative}
.metric:last-child{border-right:none}
.metric:hover{background:#FAFAF8}
.metric.active{background:var(--blue-lt)}
.metric.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--blue)}
.metric-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:700;line-height:1}
.metric-value.blue{color:var(--blue)}.metric-value.green{color:var(--green)}.metric-value.red{color:var(--red)}.metric-value.amber{color:var(--amber)}
.filter-bar{display:flex;gap:4px;padding:12px 24px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--muted);white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.filter-chip:hover{color:var(--text);border-color:var(--text)}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.filter-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filter-chip-count{font-size:11px;opacity:.7}
.content{padding:16px 24px}
.table-wrap{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.table-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.table-actions{display:flex;gap:6px}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:13px 16px;border-bottom:1px solid var(--border2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable:hover td{background:#FAFAF8;cursor:pointer}
.name-cell{font-weight:600;font-size:14px}
.sub-cell{font-size:12px;color:var(--muted);margin-top:2px}
.emp-cell{display:flex;align-items:center;gap:10px}
.emp-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.emp-avatar img{width:100%;height:100%;object-fit:cover}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap}
.badge-active{background:var(--green-lt);color:var(--green)}
.badge-disabled{background:#F3F4F6;color:var(--muted)}
.badge-atrisk{background:var(--amber-lt);color:var(--amber)}
.badge-idle{background:#F3F4F6;color:var(--muted)}
.badge-red{background:var(--red-lt);color:var(--red)}
.badge-amber{background:var(--amber-lt);color:var(--amber)}
.badge-green{background:var(--green-lt);color:var(--green)}
.badge-gray{background:#F3F4F6;color:var(--muted)}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.pw-ok{color:var(--green);font-weight:600}
.pw-warn{color:var(--amber);font-weight:600}
.pw-danger{color:var(--red);font-weight:600}
.pw-na{color:var(--hint)}
.action-btn{padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);white-space:nowrap}
.action-btn:hover{background:var(--bg);border-color:var(--blue);color:var(--blue)}
.action-btn.danger{border-color:#FECACA;color:var(--red)}
.action-btn.danger:hover{background:var(--red-lt)}
.risk-bar-wrap{display:flex;align-items:center;gap:8px}
.risk-bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;width:72px}
.risk-fill{height:100%;border-radius:3px}
.risk-score{font-size:12px;font-weight:700;width:24px;text-align:right}
.alert-banner{margin:0 24px 0;padding:12px 16px;border-radius:var(--radius);border:1px solid #FED7AA;background:#FFF7ED;display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
.alert-banner.danger{border-color:#FECACA;background:#FEF2F2}
.alert-text{flex:1;font-size:13px;color:#92400E;line-height:1.5}
.alert-banner.danger .alert-text{color:#991B1B}
.alert-action{padding:5px 10px;border-radius:var(--radius);border:1px solid currentColor;background:var(--white);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:inherit;white-space:nowrap;opacity:.8}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:400;display:flex;justify-content:flex-end}
.drawer{width:100%;max-width:460px;background:var(--white);height:100%;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.drawer-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:10}
.drawer-title{font-size:16px;font-weight:700}
.drawer-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.drawer-body{padding:20px 24px}
.drawer-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.drawer-metric{padding:12px;background:var(--bg);border-radius:var(--radius)}
.drawer-metric-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.drawer-metric-value{font-size:22px;font-weight:700}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 24px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select{width:100%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px #DBEAFE}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pdpa-note{font-size:11px;color:var(--muted);padding:7px 10px;background:var(--bg);border-radius:var(--radius);margin-bottom:12px;border-left:3px solid var(--blue)}
.lookup-row{display:flex;gap:6px}
.lookup-row input{flex:1}
.lookup-btn{padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;color:var(--muted)}
.lookup-btn:hover{color:var(--blue);border-color:var(--blue)}
.emp-preview{padding:10px;background:var(--bg);border-radius:var(--radius);margin-top:6px;display:flex;align-items:center;gap:10px}
.generic-id{font-family:monospace;font-size:13px;font-weight:700}
.empty{text-align:center;padding:48px 24px;color:var(--hint)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinner-blue{border-color:#DBEAFE;border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="brand-icon">GID</div>
    <div class="header-title">
      <h1>Head Office · Access overview</h1>
      <p id="header-sub">Loading…</p>
    </div>
  </div>
  <div class="header-actions">
    <div class="sync-badge"><span class="sync-dot"></span><span id="sync-label">Live</span></div>
    <button class="btn btn-outline" onclick="gotoBU()">BU view</button>
    <button class="btn btn-outline" onclick="gotoStore()">Stores</button>
    <button class="btn btn-outline" onclick="doSignOut()">Sign out</button>
  </div>
</div>

<div class="metrics" id="ho-metrics"></div>
<div class="filter-bar" id="bu-filter-bar"></div>
<div style="display:flex;gap:8px;padding:8px 24px;background:var(--white);border-bottom:1px solid var(--border);align-items:center">
  <select style="padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;background:var(--white)" id="filter-app" onchange="renderView()"><option value="">All systems</option></select>
  <div style="flex:1"></div>
  <button class="btn btn-outline" style="font-size:12px;padding:6px 12px" onclick="exportCSV()">Export ↗</button>
</div>
<div style="display:flex;gap:4px;padding:12px 24px;background:var(--white);border-bottom:1px solid var(--border)">
  <button class="btn btn-primary" id="tab-store" onclick="setView('store')" style="font-size:12px;padding:6px 14px">By store</button>
  <button class="btn btn-outline" id="tab-app" onclick="setView('app')" style="font-size:12px;padding:6px 14px">By application</button>
  <button class="btn btn-outline" id="tab-risk" onclick="setView('risk')" style="font-size:12px;padding:6px 14px">Risk area</button>
</div>
<div id="alerts-wrap" style="padding:8px 24px 0"></div>
<div class="content">
  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title" id="table-title">Stores</span>
      <span style="font-size:12px;color:var(--muted)" id="table-sub"></span>
    </div>
    <div style="overflow-x:auto"><table><thead id="table-head"></thead><tbody id="table-body"></tbody></table></div>
  </div>
</div>

<div class="drawer-bg hidden" id="drawer-bg" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header"><span class="drawer-title" id="drawer-title"></span><button class="drawer-close" onclick="closeDrawer()">x</button></div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL="https://hnvytilmxoiaqceseooh.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhudnl0aWxteG9pYXFjZXNlb29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTc0ODIsImV4cCI6MjA4OTQ5MzQ4Mn0.x7WCLXRZEoorxEIuk5dwHG8EpasBGGB7peBysWUdElw";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const APP_COLORS={POS:"#2563EB",GR:"#16A34A",ST:"#D97706",FP:"#DC2626",SC:"#7C3AED",default:"#6B7280"};
const BU_COLORS=["#2563EB","#16A34A","#D97706","#7C3AED","#DC2626","#0891B2"];
let SESSION=null,CUR_VIEW="store",CUR_BU=null,CUR_METRIC=null;
let BUS=[],STORES=[],APPS=[],ASSIGNMENTS=[];

async function init(){
  let {data:{session}}=await sb.auth.getSession();
  if(!session){const {data:r}=await sb.auth.refreshSession();session=r?.session;}
  if(!session){location.href="index.html";return;}
  SESSION=session;await loadAll();
}

async function loadAll(){
  setSyncState("syncing");
  const [busRes,storesRes,appsRes]=await Promise.all([
    sb.from("business_units").select("*").order("name"),
    sb.from("stores").select("*").eq("active",true).order("code"),
    sb.from("apps").select("*").eq("active",true).order("code")
  ]);
  BUS=busRes.data||[];STORES=storesRes.data||[];APPS=appsRes.data||[];
  const storeIds=STORES.map(s=>s.id);
  if(storeIds.length){
    const {data:asn}=await sb.from("generic_id_assignments")
      .select("id,store_id,app_id,generic_id,status,pw_last_rotated,emp_code,supervisor_emp_code,app:app_id(code,name,pw_rotation_days)")
      .in("store_id",storeIds);
    ASSIGNMENTS=asn||[];
  }
  const appCodes=[...new Set(APPS.map(a=>a.code))];
  document.getElementById("filter-app").innerHTML="<option value=''>All systems</option>"+
    appCodes.map(c=>"<option value='"+c+"'>"+( APPS.find(a=>a.code===c)?.name||c)+"</option>").join("");
  document.getElementById("header-sub").textContent=
    "Generic ID program · "+STORES.length+" stores · "+appCodes.length+" systems · "+BUS.length+" business units";
  renderBUTabs();renderMetrics();renderView();setSyncState("ok");
}

function setSyncState(s){document.getElementById("sync-label").textContent=s==="syncing"?"Syncing…":"Live";}

function baseAsn(){
  const appCode=document.getElementById("filter-app")?.value||"";
  const storeIds=(CUR_BU?STORES.filter(s=>s.bu_id===CUR_BU):STORES).map(s=>s.id);
  return ASSIGNMENTS.filter(a=>storeIds.includes(a.store_id)&&(!appCode||a.app?.code===appCode));
}

function filteredAsn(){
  let asn=baseAsn();
  if(CUR_METRIC==="active") asn=asn.filter(a=>a.status==="active");
  else if(CUR_METRIC==="unassigned") asn=asn.filter(a=>!a.emp_code||a.status==="idle");
  else if(CUR_METRIC==="pw_overdue") asn=asn.filter(a=>a.status==="active"&&isPwOverdue(a));
  else if(CUR_METRIC==="orphan") asn=asn.filter(a=>a.status==="orphan");
  else if(CUR_METRIC==="resign") asn=asn.filter(a=>a.status==="at_risk");
  return asn;
}

function renderBUTabs(){
  document.getElementById("bu-filter-bar").innerHTML=
    "<button class='filter-chip"+(CUR_BU==null?" active":"")+"' onclick='setBU(null)'>All BUs <span class='filter-chip-count'>"+STORES.length+" stores</span></button>"+
    BUS.map((b,i)=>{
      const cnt=STORES.filter(s=>s.bu_id===b.id).length;
      return "<button class='filter-chip"+(CUR_BU===b.id?" active":"")+"' onclick='setBU(""+b.id+"")'><span class='filter-chip-dot' style='background:"+BU_COLORS[i%BU_COLORS.length]+"'></span>"+b.name+" <span class='filter-chip-count'>"+cnt+"</span></button>";
    }).join("");
}

function setBU(id){CUR_BU=id;CUR_METRIC=null;renderBUTabs();renderMetrics();renderView();}

function renderMetrics(){
  const asn=baseAsn();
  const active=asn.filter(a=>a.status==="active").length;
  const unassigned=asn.filter(a=>!a.emp_code||a.status==="idle").length;
  const pwDue=asn.filter(a=>a.status==="active"&&isPwOverdue(a)).length;
  const orphans=asn.filter(a=>a.status==="orphan").length;
  const resign=asn.filter(a=>a.status==="at_risk").length;
  const mk=(label,val,cls,f)=>"<div class='metric"+(CUR_METRIC===f?" active":"")+"' onclick='setMetric(""+f+"")'><div class='metric-label'>"+label+"</div><div class='metric-value "+cls+"'>"+val+"</div></div>";
  document.getElementById("ho-metrics").innerHTML=
    mk("Total Generic IDs",asn.length,"blue","all")+
    mk("Active",active,"green","active")+
    mk("Unassigned",unassigned,"","unassigned")+
    mk("Pw Overdue",pwDue,pwDue?"amber":"","pw_overdue")+
    mk("Orphan Sessions",orphans,orphans?"red":"","orphan")+
    mk("Pending Resign",resign,resign?"amber":"","resign");
}

function setMetric(f){CUR_METRIC=(f==="all"?null:f);renderMetrics();renderView();}

function setView(v){
  CUR_VIEW=v;
  ["store","app","risk"].forEach(x=>{
    const b=document.getElementById("tab-"+x);
    b.className=x===v?"btn btn-primary":"btn btn-outline";
    b.style.fontSize="12px";b.style.padding="6px 14px";
  });
  renderView();
}

function renderView(){
  const alerts=buildAlerts();
  document.getElementById("alerts-wrap").innerHTML=alerts;
  if(CUR_METRIC&&CUR_METRIC!=="all"){renderMetricTable();return;}
  if(CUR_VIEW==="store") renderByStore();
  else if(CUR_VIEW==="app") renderByApp();
  else renderRisk();
}

function buildAlerts(){
  const asn=baseAsn();
  const atRisk=asn.filter(a=>a.status==="at_risk");
  const orphans=asn.filter(a=>a.status==="orphan");
  let html="";
  if(orphans.length) html+="<div class='alert-banner danger' style='margin-bottom:8px'><span>⛔</span><div class='alert-text'><strong>Orphan sessions:</strong> "+orphans.map(a=>a.generic_id).join(", ")+" — login with no active assignment.</div></div>";
  if(atRisk.length) html+="<div class='alert-banner' style='margin-bottom:8px'><span>⚠️</span><div class='alert-text'>Supervisor resigned. <strong>"+atRisk.map(a=>a.generic_id).join(", ")+"</strong> at risk — reassign or disable.</div></div>";
  return html;
}

function renderMetricTable(){
  const asn=filteredAsn();
  const labels={active:"Active IDs",unassigned:"Unassigned IDs",pw_overdue:"Password Overdue",orphan:"Orphan Sessions",resign:"Pending Resign"};
  document.getElementById("table-title").textContent=labels[CUR_METRIC]||"";
  document.getElementById("table-sub").textContent=asn.length+" IDs";
  document.getElementById("table-head").innerHTML="<tr><th>Generic ID</th><th>Store</th><th>App</th><th>Employee</th><th>Status</th><th>Pw Age</th></tr>";
  document.getElementById("table-body").innerHTML=asn.map(a=>{
    const store=STORES.find(s=>s.id===a.store_id);
    const days=a.pw_last_rotated?Math.floor((Date.now()-new Date(a.pw_last_rotated))/864e5):null;
    const pwMax=a.app?.pw_rotation_days||30;
    const pwCls=days===null?"pw-na":days>=pwMax?"pw-danger":days>=pwMax*.7?"pw-warn":"pw-ok";
    return "<tr><td><span class='generic-id'>"+a.generic_id+"</span></td><td>"+(store?.name||"—")+"</td><td>"+(a.app?.name||"—")+"</td><td style='font-family:monospace;font-size:12px'>"+(a.emp_code||"—")+"</td><td>"+statusBadge(a.status)+"</td><td><span class='"+pwCls+"'>"+(days!==null?days+"d":"N/A")+"</span></td></tr>";
  }).join("")||"<tr><td colspan='6'><div class='empty'><div class='empty-icon'>✅</div>No items</div></td></tr>";
}

function renderByStore(){
  const stores=CUR_BU?STORES.filter(s=>s.bu_id===CUR_BU):STORES;
  const appCode=document.getElementById("filter-app")?.value||"";
  document.getElementById("table-title").textContent="Stores";
  document.getElementById("table-sub").textContent=stores.length+" stores";
  document.getElementById("table-head").innerHTML="<tr><th>Store</th><th>BU</th><th>Region</th><th>IDs total</th><th>Active</th><th>Pw overdue</th><th>Orphan sessions</th><th>Risk score</th><th></th></tr>";
  const rows=stores.map(s=>{
    const bu=BUS.find(b=>b.id===s.bu_id);
    const asn=ASSIGNMENTS.filter(a=>a.store_id===s.id&&(!appCode||a.app?.code===appCode));
    const active=asn.filter(a=>a.status==="active").length;
    const pwDue=asn.filter(a=>a.status==="active"&&isPwOverdue(a)).length;
    const orphans=asn.filter(a=>a.status==="orphan").length;
    const risk=asn.filter(a=>["at_risk","orphan"].includes(a.status)).length;
    const riskScore=Math.min(100,pwDue*3+orphans*15+risk*10);
    const riskColor=riskScore>=70?"var(--red)":riskScore>=30?"var(--amber)":"var(--green)";
    return {s,bu,asn,active,pwDue,orphans,riskScore,riskColor};
  }).sort((a,b)=>b.riskScore-a.riskScore);
  document.getElementById("table-body").innerHTML=rows.map(({s,bu,asn,active,pwDue,orphans,riskScore,riskColor})=>
    "<tr class='clickable' onclick='openStoreDrawer(""+s.id+"")'><td><div class='name-cell'>"+s.name+"</div></td><td style='font-size:12px;color:var(--muted)'>"+(bu?.name||"—")+"</td><td style='font-size:12px;color:var(--muted)'>"+(s.region||"—")+"</td><td style='font-weight:600'>"+asn.length+"</td><td style='color:var(--green);font-weight:600'>"+active+"</td><td>"+(pwDue>0?"<span class='badge badge-amber'>"+pwDue+"</span>":"<span style='color:var(--hint)'>0</span>")+"</td><td>"+(orphans>0?"<span class='badge badge-red'>"+orphans+"</span>":"<span style='color:var(--hint)'>0</span>")+"</td><td><div class='risk-bar-wrap'><div class='risk-bar'><div class='risk-fill' style='width:"+riskScore+"%;background:"+riskColor+"'></div></div><span class='risk-score' style='color:"+riskColor+"'>"+riskScore+"</span></div></td><td style='color:var(--hint)'>→</td></tr>"
  ).join("")||"<tr><td colspan='9'><div class='empty'><div class='empty-icon'>🏪</div>No stores</div></td></tr>";
}

function renderByApp(){
  const appCodes=[...new Set(APPS.map(a=>a.code))];
  const storeIds=(CUR_BU?STORES.filter(s=>s.bu_id===CUR_BU):STORES).map(s=>s.id);
  document.getElementById("table-title").textContent="Applications";
  document.getElementById("table-sub").textContent=appCodes.length+" systems";
  document.getElementById("table-head").innerHTML="<tr><th>Application</th><th>Total IDs</th><th>Active</th><th>Pw overdue</th><th>Risk alerts</th><th></th></tr>";
  document.getElementById("table-body").innerHTML=appCodes.map(code=>{
    const asn=ASSIGNMENTS.filter(a=>a.app?.code===code&&storeIds.includes(a.store_id));
    const active=asn.filter(a=>a.status==="active").length;
    const pwDue=asn.filter(a=>a.status==="active"&&isPwOverdue(a)).length;
    const risk=asn.filter(a=>["at_risk","orphan"].includes(a.status)).length;
    const color=APP_COLORS[code]||APP_COLORS.default;
    return "<tr class='clickable' onclick='openAppDrawer(""+code+"")'><td><div style='display:flex;align-items:center;gap:8px'><span style='width:8px;height:8px;border-radius:50%;background:"+color+";display:inline-block'></span><span class='name-cell'>"+(APPS.find(a=>a.code===code)?.name||code)+"</span></div></td><td style='font-weight:600'>"+asn.length+"</td><td style='color:var(--green);font-weight:600'>"+active+"</td><td>"+(pwDue>0?"<span class='badge badge-amber'>"+pwDue+"</span>":"<span style='color:var(--hint)'>0</span>")+"</td><td>"+(risk>0?"<span class='badge badge-red'>"+risk+"</span>":"<span style='color:var(--hint)'>0</span>")+"</td><td style='color:var(--hint)'>→</td></tr>";
  }).join("");
}

function renderRisk(){
  const storeIds=(CUR_BU?STORES.filter(s=>s.bu_id===CUR_BU):STORES).map(s=>s.id);
  const asn=ASSIGNMENTS.filter(a=>storeIds.includes(a.store_id));
  const items=[...asn.filter(a=>a.status==="orphan").map(a=>({icon:"⛔",label:"Orphan session",a})),...asn.filter(a=>a.status==="at_risk").map(a=>({icon:"⚠️",label:"Supervisor resigned",a})),...asn.filter(a=>a.status==="active"&&isPwOverdue(a)).map(a=>({icon:"🔑",label:"Password overdue",a}))];
  document.getElementById("table-title").textContent="Risk items";
  document.getElementById("table-sub").textContent=items.length+" items";
  document.getElementById("table-head").innerHTML="<tr><th>Risk</th><th>Generic ID</th><th>Store</th><th>App</th><th>Employee</th><th>Days</th></tr>";
  document.getElementById("table-body").innerHTML=items.map(({icon,label,a})=>{
    const store=STORES.find(s=>s.id===a.store_id);
    const days=a.pw_last_rotated?Math.floor((Date.now()-new Date(a.pw_last_rotated))/864e5):null;
    return "<tr><td>"+icon+" <span style='font-size:12px;font-weight:600'>"+label+"</span></td><td><span class='generic-id'>"+a.generic_id+"</span></td><td style='font-size:12px'>"+(store?.name||"—")+"</td><td style='font-size:12px;color:var(--muted)'>"+(a.app?.name||"—")+"</td><td style='font-family:monospace;font-size:12px'>"+(a.emp_code||"—")+"</td><td style='font-size:12px;color:var(--muted)'>"+(days!==null?days+"d":"—")+"</td></tr>";
  }).join("")||"<tr><td colspan='6'><div class='empty'><div class='empty-icon'>✅</div>No open risks</div></td></tr>";
}

function openStoreDrawer(storeId){
  const s=STORES.find(x=>x.id===storeId);if(!s)return;
  const bu=BUS.find(b=>b.id===s.bu_id);
  const asn=ASSIGNMENTS.filter(a=>a.store_id===storeId);
  const active=asn.filter(a=>a.status==="active").length;
  const pwDue=asn.filter(a=>a.status==="active"&&isPwOverdue(a)).length;
  const risk=asn.filter(a=>["at_risk","orphan"].includes(a.status)).length;
  document.getElementById("drawer-title").textContent=s.name;
  document.getElementById("drawer-body").innerHTML=
    "<div class='drawer-metrics'><div class='drawer-metric'><div class='drawer-metric-label'>Total IDs</div><div class='drawer-metric-value' style='color:var(--blue)'>"+asn.length+"</div></div><div class='drawer-metric'><div class='drawer-metric-label'>Active</div><div class='drawer-metric-value' style='color:var(--green)'>"+active+"</div></div><div class='drawer-metric'><div class='drawer-metric-label'>Pw overdue</div><div class='drawer-metric-value' style='color:"+(pwDue?"var(--amber)":"var(--text)")+"'>"+pwDue+"</div></div><div class='drawer-metric'><div class='drawer-metric-label'>Risk alerts</div><div class='drawer-metric-value' style='color:"+(risk?"var(--red)":"var(--text)")+"'>"+risk+"</div></div></div>"+
    "<div style='font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:10px'>By application</div>"+
    APPS.filter(a=>a.bu_id===s.bu_id).map(a=>{
      const c=asn.filter(x=>x.app?.code===a.code);
      return "<div style='display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border2)'><div style='display:flex;align-items:center;gap:7px'><span style='width:7px;height:7px;border-radius:50%;background:"+(APP_COLORS[a.code]||APP_COLORS.default)+";display:inline-block'></span><span style='font-size:13px'>"+a.name+"</span></div><div style='display:flex;gap:5px'><span class='badge badge-gray'>"+c.length+"</span><span class='badge badge-green'>"+c.filter(x=>x.status==="active").length+" active</span></div></div>";
    }).join("")+
    "<div style='margin-top:6px;font-size:12px;color:var(--muted)'>BU: "+(bu?.name||"—")+" · Region: "+(s.region||"—")+"</div>"+
    "<button class='btn btn-primary' style='width:100%;margin-top:16px;justify-content:center' onclick='gotoStorePortal(""+storeId+"",""+s.name+"",""+s.bu_id+"")'>Open store portal →</button>";
  document.getElementById("drawer-bg").classList.remove("hidden");
}

function openAppDrawer(code){
  const appName=APPS.find(a=>a.code===code)?.name||code;
  const storeIds=(CUR_BU?STORES.filter(s=>s.bu_id===CUR_BU):STORES).map(s=>s.id);
  const asn=ASSIGNMENTS.filter(a=>a.app?.code===code&&storeIds.includes(a.store_id));
  document.getElementById("drawer-title").textContent=appName;
  document.getElementById("drawer-body").innerHTML=
    "<div class='drawer-metrics'><div class='drawer-metric'><div class='drawer-metric-label'>Total IDs</div><div class='drawer-metric-value' style='color:"+(APP_COLORS[code]||APP_COLORS.default)+"'>"+asn.length+"</div></div><div class='drawer-metric'><div class='drawer-metric-label'>Active</div><div class='drawer-metric-value' style='color:var(--green)'>"+asn.filter(a=>a.status==="active").length+"</div></div></div>"+
    "<div style='font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:10px'>By store</div>"+
    STORES.filter(s=>storeIds.includes(s.id)).map(s=>{
      const c=asn.filter(a=>a.store_id===s.id);if(!c.length)return"";
      return "<div style='display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border2)'><span style='font-size:13px'>"+s.name+"</span><div style='display:flex;gap:5px'><span class='badge badge-gray'>"+c.length+"</span><span class='badge badge-green'>"+c.filter(x=>x.status==="active").length+"</span>"+(c.filter(x=>isPwOverdue(x)).length?"<span class='badge badge-amber'>"+c.filter(x=>isPwOverdue(x)).length+" pw</span>":"")+"</div></div>";
    }).join("");
  document.getElementById("drawer-bg").classList.remove("hidden");
}

function closeDrawer(){document.getElementById("drawer-bg").classList.add("hidden");}
function statusBadge(s){return({"active":"<span class='badge badge-active'><span class='badge-dot'></span>Active</span>","disabled":"<span class='badge badge-disabled'>Disabled</span>","at_risk":"<span class='badge badge-amber'>⚠ At risk</span>","idle":"<span class='badge badge-idle'>Idle</span>","orphan":"<span class='badge badge-red'>⛔ Orphan</span>"}[s])||"<span class='badge badge-idle'>"+s+"</span>";}
function isPwOverdue(a){if(!a.pw_last_rotated)return false;return Math.floor((Date.now()-new Date(a.pw_last_rotated))/864e5)>=(a.app?.pw_rotation_days||30);}
function gotoBU(){sessionStorage.setItem("gid_role","ho_admin");if(BUS.length>1){openBUPicker();return;}sessionStorage.setItem("gid_bu_id",BUS[0]?.id);location.href="bu.html";}
function openBUPicker(){
  document.getElementById("drawer-title").textContent="Select BU";
  document.getElementById("drawer-body").innerHTML=BUS.map((b,i)=>
    "<div style='display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border2);cursor:pointer' onclick='selectBU(""+b.id+"",""+b.name+"")' onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''"><div style='width:36px;height:36px;border-radius:9px;background:"+BU_COLORS[i%BU_COLORS.length]+";display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0'>"+b.code.slice(0,2)+"</div><div><div style='font-size:14px;font-weight:600'>"+b.name+"</div><div style='font-size:12px;color:var(--muted)'>"+STORES.filter(s=>s.bu_id===b.id).length+" stores</div></div><span style='margin-left:auto;color:var(--hint)'>›</span></div>"
  ).join("");
  document.getElementById("drawer-bg").classList.remove("hidden");
}
function selectBU(id,name){sessionStorage.setItem("gid_bu_id",id);sessionStorage.setItem("gid_bu_name",name);sessionStorage.setItem("gid_role","ho_admin");location.href="bu.html";}
function gotoStore(){sessionStorage.removeItem("gid_store_id");location.href="store.html";}
function gotoStorePortal(storeId,name,buId){sessionStorage.setItem("gid_store_id",storeId);sessionStorage.setItem("gid_store_name",name);sessionStorage.setItem("gid_bu_id",buId);location.href="store.html";}
function exportCSV(){
  const rows=[["Store","BU","Region","Total","Active","Pw Overdue","Risk"]];
  STORES.forEach(s=>{const bu=BUS.find(b=>b.id===s.bu_id);const asn=ASSIGNMENTS.filter(a=>a.store_id===s.id);rows.push([s.name,bu?.name||"",s.region||"",asn.length,asn.filter(a=>a.status==="active").length,asn.filter(a=>isPwOverdue(a)).length,asn.filter(a=>["at_risk","orphan"].includes(a.status)).length]);});
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(r=>r.join(",")).join("\n"));a.download="ho_report.csv";a.click();
}
async function doSignOut(){await sb.auth.signOut();sessionStorage.clear();location.href="index.html";}
init();
</script>
</body>
</html>
